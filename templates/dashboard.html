<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🥚 蛋蛋基金 · 模拟交易平台</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>
*{box-sizing:border-box}
body{background:#0f172a;color:#e2e8f0;font-family:'Segoe UI',system-ui,sans-serif;margin:0}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:#1e293b}
::-webkit-scrollbar-thumb{background:#475569;border-radius:3px}
.card{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:16px}
.up{color:#ef4444}.down{color:#22c55e}
.btn{padding:8px 16px;border-radius:8px;font-weight:600;cursor:pointer;border:none;transition:all .2s}
.btn-buy{background:#dc2626;color:#fff}.btn-buy:hover{background:#b91c1c}
.btn-sell{background:#16a34a;color:#fff}.btn-sell:hover{background:#15803d}
.btn-blue{background:#3b82f6;color:#fff}.btn-blue:hover{background:#2563eb}
.tab{padding:6px 14px;cursor:pointer;border-bottom:2px solid transparent;font-size:13px;color:#94a3b8}
.tab.active{border-color:#3b82f6;color:#60a5fa}
.tab:hover{color:#e2e8f0}
input,select{background:#0f172a;border:1px solid #334155;color:#e2e8f0;padding:8px 12px;border-radius:8px;outline:none;width:100%}
input:focus{border-color:#3b82f6}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:8px;color:#94a3b8;font-size:11px;text-transform:uppercase;border-bottom:1px solid #334155;letter-spacing:.5px}
td{padding:8px;border-bottom:1px solid #1e293b;font-size:13px}
.badge{display:inline-block;padding:2px 8px;border-radius:9999px;font-size:11px;font-weight:600}
.badge-buy{background:#991b1b;color:#fca5a5}.badge-sell{background:#166534;color:#86efac}
.mono{font-family:'SF Mono','Fira Code','Consolas',monospace}
</style>
</head>
<body>

<div x-data="app()" x-init="init()">
<!-- Header -->
<header style="border-bottom:1px solid #334155;padding:12px 24px;display:flex;align-items:center;justify-content:space-between">
  <div style="display:flex;align-items:center;gap:12px">
    <span style="font-size:28px">🥚</span>
    <div>
      <h1 style="font-size:18px;font-weight:700;color:#fff;margin:0">蛋蛋基金</h1>
      <p style="font-size:11px;color:#94a3b8;margin:0">模拟交易平台</p>
    </div>
  </div>
  <div style="display:flex;gap:32px;font-size:13px">
    <div style="text-align:right">
      <div style="color:#94a3b8;font-size:11px">总资产</div>
      <div style="font-size:20px;font-weight:700;color:#fff" class="mono">¥<span x-text="fmt(data.account.total_value)"></span></div>
    </div>
    <div style="text-align:right">
      <div style="color:#94a3b8;font-size:11px">可用现金</div>
      <div style="font-size:16px;font-weight:600" class="mono">¥<span x-text="fmt(data.account.cash)"></span></div>
    </div>
    <div style="text-align:right">
      <div style="color:#94a3b8;font-size:11px">总收益</div>
      <div style="font-size:16px;font-weight:600" class="mono" :class="(data.account.total_profit||0)>=0?'up':'down'">
        <span x-text="((data.account.total_profit||0)>=0?'+':'')+fmt(data.account.total_profit)"></span>
      </div>
    </div>
    <div style="text-align:right">
      <div style="color:#94a3b8;font-size:11px">收益率</div>
      <div style="font-size:16px;font-weight:600" class="mono" :class="roi>=0?'up':'down'">
        <span x-text="(roi>=0?'+':'')+roi.toFixed(2)+'%'"></span>
      </div>
    </div>
  </div>
</header>

<!-- Index Bar -->
<div style="padding:8px 24px;display:flex;align-items:center;gap:16px;font-size:13px;border-bottom:1px solid #334155;background:rgba(15,23,42,.5)">
  <template x-if="data.index.name">
    <div style="display:flex;align-items:center;gap:12px">
      <span style="font-weight:600" x-text="data.index.name"></span>
      <span class="mono" style="font-size:16px;font-weight:700" :class="(data.index.change_pct||0)>=0?'up':'down'" x-text="(data.index.price||0).toFixed(2)"></span>
      <span class="mono" :class="(data.index.change_pct||0)>=0?'up':'down'" x-text="((data.index.change_pct||0)>=0?'+':'')+(data.index.change_pct||0).toFixed(2)+'%'"></span>
      <span style="color:#94a3b8">MA5:<span class="mono" x-text="(data.index.ma5||0).toFixed(2)"></span></span>
      <span style="color:#94a3b8">MA10:<span class="mono" x-text="(data.index.ma10||0).toFixed(2)"></span></span>
      <span class="badge" :class="data.index.above_ma5?'badge-buy':'badge-sell'" x-text="data.index.above_ma5?'站上5日线':'跌破5日线'"></span>
    </div>
  </template>
  <div style="margin-left:auto;color:#64748b;font-size:11px">刷新: <span x-text="lastUpdate"></span></div>
</div>

<!-- Main -->
<div style="display:flex;padding:16px;gap:16px;height:calc(100vh - 100px)">
  <!-- Left 70% -->
  <div style="width:70%;display:flex;flex-direction:column;gap:16px;overflow:hidden">
    <!-- Equity Chart -->
    <div class="card" style="height:300px;flex-shrink:0">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
        <h2 style="font-weight:600;color:#fff;margin:0;font-size:15px">📈 净值曲线</h2>
        <div style="display:flex;gap:4px">
          <button class="tab" :class="eqRange===7&&'active'" @click="eqRange=7;renderChart()">7天</button>
          <button class="tab" :class="eqRange===30&&'active'" @click="eqRange=30;renderChart()">30天</button>
          <button class="tab" :class="eqRange===0&&'active'" @click="eqRange=0;renderChart()">全部</button>
        </div>
      </div>
      <div id="eqChart" style="height:240px"></div>
    </div>

    <!-- Positions -->
    <div class="card" style="flex:1;overflow:auto;min-height:0">
      <h2 style="font-weight:600;color:#fff;margin:0 0 12px;font-size:15px">📊 持仓</h2>
      <table>
        <thead><tr><th>代码</th><th>名称</th><th>股数</th><th>成本</th><th>现价</th><th>市值</th><th>盈亏</th><th>盈亏%</th><th>操作</th></tr></thead>
        <tbody>
          <template x-for="(p,code) in data.positions" :key="code">
            <tr>
              <td class="mono" x-text="code"></td>
              <td x-text="p.stock_name"></td>
              <td class="mono" x-text="p.shares"></td>
              <td class="mono">¥<span x-text="p.avg_cost.toFixed(2)"></span></td>
              <td class="mono" :class="(p.current_price||p.avg_cost)>=p.avg_cost?'up':'down'">¥<span x-text="(p.current_price||p.avg_cost).toFixed(2)"></span></td>
              <td class="mono">¥<span x-text="fmt(p.market_value||(p.current_price||p.avg_cost)*p.shares)"></span></td>
              <td class="mono" :class="(p.profit||0)>=0?'up':'down'"><span x-text="((p.profit||0)>=0?'+':'')+fmt(p.profit||0)"></span></td>
              <td class="mono" :class="(p.profit_pct||0)>=0?'up':'down'"><span x-text="((p.profit_pct||0)>=0?'+':'')+(p.profit_pct||0).toFixed(2)+'%'"></span></td>
              <td><button class="btn btn-sell" style="font-size:12px;padding:4px 12px" @click="sellStock(code,p.shares)">卖出</button></td>
            </tr>
          </template>
          <tr x-show="Object.keys(data.positions).length===0"><td colspan="9" style="text-align:center;color:#64748b;padding:20px">暂无持仓</td></tr>
        </tbody>
      </table>
    </div>

    <!-- Trades -->
    <div class="card" style="max-height:240px;overflow:auto;flex-shrink:0">
      <h2 style="font-weight:600;color:#fff;margin:0 0 12px;font-size:15px">📋 交易记录</h2>
      <table>
        <thead><tr><th>时间</th><th>操作</th><th>代码</th><th>名称</th><th>价格</th><th>股数</th><th>金额</th><th>盈亏</th><th>理由</th></tr></thead>
        <tbody>
          <template x-for="t in data.trades" :key="t.id||t.timestamp">
            <tr>
              <td class="mono" style="font-size:11px" x-text="(t.timestamp||'').substring(5,16)"></td>
              <td><span class="badge" :class="t.action==='buy'?'badge-buy':'badge-sell'" x-text="t.action==='buy'?'买入':'卖出'"></span></td>
              <td class="mono" x-text="t.stock_code"></td>
              <td x-text="t.stock_name"></td>
              <td class="mono">¥<span x-text="(t.price||0).toFixed(2)"></span></td>
              <td class="mono" x-text="t.shares"></td>
              <td class="mono">¥<span x-text="fmt(t.amount)"></span></td>
              <td class="mono" :class="(t.profit||0)>=0?'up':'down'" x-text="t.profit?((t.profit>=0?'+':'')+t.profit.toFixed(2)):'-'"></td>
              <td style="font-size:11px;color:#94a3b8" x-text="t.reason||'-'"></td>
            </tr>
          </template>
          <tr x-show="data.trades.length===0"><td colspan="9" style="text-align:center;color:#64748b;padding:20px">暂无交易</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Right 30% -->
  <div style="width:30%;display:flex;flex-direction:column;gap:16px;overflow:hidden">
    <!-- Quick Trade -->
    <div class="card" style="flex-shrink:0">
      <div style="display:flex;gap:8px;margin-bottom:12px">
        <button class="btn" style="flex:1" :class="mode==='buy'?'btn-buy':'background:#334155;color:#94a3b8'" @click="mode='buy'">买入</button>
        <button class="btn" style="flex:1" :class="mode==='sell'?'btn-sell':'background:#334155;color:#94a3b8'" @click="mode='sell'">卖出</button>
      </div>
      <div style="display:flex;flex-direction:column;gap:8px">
        <input type="text" placeholder="股票代码 (如 600519)" x-model="code">
        <input type="number" placeholder="数量 (100的倍数)" x-model.number="shares" min="100" step="100">
        <input type="text" placeholder="理由 (可选)" x-model="reason">
        <div x-show="msg" style="font-size:13px;padding:8px;border-radius:8px" :class="msgOk?'background:#14532d;color:#86efac':'background:#450a0a;color:#fca5a5'" x-text="msg"></div>
        <button class="btn" style="width:100%" :class="mode==='buy'?'btn-buy':'btn-sell'" @click="trade()" x-text="mode==='buy'?'确认买入':'确认卖出'"></button>
      </div>
    </div>

    <!-- Analysis -->
    <div class="card" style="flex-shrink:0">
      <h2 style="font-weight:600;color:#fff;margin:0 0 12px;font-size:15px">🔍 股票分析</h2>
      <div style="display:flex;gap:8px;margin-bottom:12px">
        <div style="position:relative">
          <input type="text" placeholder="输入代码或名称" x-model="queryCode" 
            @input="debounceSearch()" @focus="showSuggestions=true" 
            @keydown.enter="showSuggestions=false;analyze()"
            @keydown.escape="showSuggestions=false"
            style="flex:1">
          <div x-show="showSuggestions && suggestions.length" style="position:absolute;top:100%;left:0;right:0;background:#1e293b;border:1px solid #334155;border-radius:8px;z-index:100;max-height:160px;overflow:auto">
            <template x-for="s in suggestions" :key="s.code">
              <div @click="queryCode=s.name+'('+s.code+')';showSuggestions=false;analyze()" 
                style="padding:8px 12px;cursor:pointer;font-size:13px" 
                :style="hover:bg#1e3a5f">
                <span x-text="s.name"></span>
                <span style="color:#64748b;margin-left:6px" x-text="s.code"></span>
              </div>
            </template>
          </div>
        </div>
        <button class="btn btn-blue" @click="analyze()">查询</button>
      </div>
      <div x-show="result" style="font-size:13px">
        <template x-if="result">
          <div style="display:flex;flex-direction:column;gap:4px">
            <div style="display:flex;justify-content:space-between"><span style="color:#94a3b8">名称</span><span x-text="result.name"></span></div>
            <div style="display:flex;justify-content:space-between"><span style="color:#94a3b8">现价</span><span class="mono" :class="(result.change_pct||0)>=0?'up':'down'">¥<span x-text="(result.price||0).toFixed(2)"></span></span></div>
            <div style="display:flex;justify-content:space-between"><span style="color:#94a3b8">涨跌</span><span class="mono" :class="(result.change_pct||0)>=0?'up':'down'" x-text="((result.change_pct||0)>=0?'+':'')+(result.change_pct||0).toFixed(2)+'%'"></span></div>
            <div style="display:flex;justify-content:space-between"><span style="color:#94a3b8">最高</span><span class="mono" x-text="(result.high||0).toFixed(2)"></span></div>
            <div style="display:flex;justify-content:space-between"><span style="color:#94a3b8">最低</span><span class="mono" x-text="(result.low||0).toFixed(2)"></span></div>
          </div>
        </template>
      </div>

      <!-- Buffett Analysis Result -->
      <div x-show="analyzeResult" style="margin-top:10px">
        <template x-if="analyzeResult">
          <div style="display:flex;flex-direction:column;gap:6px">
            <div style="display:flex;align-items:center;gap:6px">
              <span style="font-size:16px" x-text="'⭐'.repeat(analyzeResult.stars||0)"></span>
              <span style="font-weight:600;color:#fff" x-text="(analyzeResult.rating||'')+' '+(analyzeResult.action||'')"></span>
            </div>
            <div style="display:flex;justify-content:space-between"><span style="color:#94a3b8">综合评分</span><span class="mono" style="color:#60a5fa" x-text="(analyzeResult.total_score||0)+'/100'"></span></div>
            <div style="display:flex;justify-content:space-between"><span style="color:#94a3b8">PE</span><span class="mono" x-text="(analyzeResult.indicators?.PE?.value||'N/A')+'x'"></span></div>
            <div style="display:flex;justify-content:space-between"><span style="color:#94a3b8">ROE</span><span class="mono" x-text="(analyzeResult.indicators?.ROE?.value||'N/A')+'%'"></span></div>
            <div style="display:flex;justify-content:space-between"><span style="color:#94a3b8">目标价</span><span class="mono" style="color:#22c55e" x-text="'¥'+(analyzeResult.target_price||'?')"></span></div>
            <div style="display:flex;justify-content:space-between"><span style="color:#94a3b8">止损价</span><span class="mono" style="color:#ef4444" x-text="'¥'+(analyzeResult.stop_price||'?')"></span></div>
            <div style="margin-top:4px;padding:8px;background:#0f172a;border-radius:6px;font-size:12px;color:#94a3b8;white-space:pre-wrap;line-height:1.4" x-text="analyzeResult.summary||''"></div>
          </div>
        </template>
      </div>
    </div>

    <!-- Reviews -->
    <div class="card" style="flex:1;overflow:auto;min-height:0">
      <h2 style="font-weight:600;color:#fff;margin:0 0 12px;font-size:15px">📝 复盘日志</h2>
      <div style="display:flex;flex-direction:column;gap:12px">
        <template x-for="r in data.reviews" :key="r.id||r.date">
          <div style="border-left:3px solid #3b82f6;padding-left:12px">
            <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">
              <span style="font-size:11px;color:#94a3b8" class="mono" x-text="r.date"></span>
              <template x-if="r.tags">
                <template x-for="tag in (Array.isArray(r.tags)?r.tags:r.tags.split(','))" :key="tag">
                  <span class="badge" style="background:#1e3a5f;color:#93c5fd" x-text="typeof tag==='string'?tag.trim():tag"></span>
                </template>
              </template>
            </div>
            <p style="font-size:13px;color:#cbd5e1;margin:0" x-text="(r.content||'').substring(0,120)+(r.content&&r.content.length>120?'...':'')"></p>
          </div>
        </template>
        <div x-show="data.reviews.length===0" style="text-align:center;color:#64748b;padding:20px">暂无复盘</div>
      </div>
    </div>
  </div>
</div>
</div>

<script>
function app(){
  return {
    data: {
      account: {cash:0, total_value:50000, total_profit:0},
      positions: {}, trades: [], reviews: [], equity: [], index: {}, stats: {}
    },
    eqRange: 30, chart: null, lastUpdate: '-',
    mode: 'buy', code: '', shares: 100, reason: '', msg: '', msgOk: false,
    queryCode: '', result: null, analyzeResult: null, suggestions: [], showSuggestions: false,
    debounceSearch: null,

    get roi(){ return ((this.data.account.total_value - 50000) / 50000) * 100 },

    async init(){
      // setup debounce for search
      let t;
      this.debounceSearch = () => {
        clearTimeout(t);
        t = setTimeout(() => this.searchStocks(this.queryCode), 300);
      };
      await this.load();
      setInterval(() => this.load(), 30000);
    },

    async load(){
      try {
        // 用 /api/dashboard 一次拿全部数据
        const r = await fetch('/api/dashboard');
        const d = await r.json();
        if(d.error) { console.error('Dashboard error:', d.error); return; }
        this.data.account = d.account || {cash:0,total_value:50000,total_profit:0};
        this.data.positions = d.positions || {};
        this.data.trades = d.trades || [];
        this.data.reviews = (d.reviews && d.reviews.reviews) ? d.reviews.reviews : (Array.isArray(d.reviews) ? d.reviews : []);
        this.data.equity = d.equity || [];
        this.data.index = d.index || {};
        this.data.stats = d.stats || {};
        this.renderChart();
        this.lastUpdate = new Date().toLocaleTimeString('zh-CN',{hour12:false});
      } catch(e){ console.error('Load failed:', e); }
    },

    fmt(n){ if(n==null)return'0.00'; return Number(n).toLocaleString('zh-CN',{minimumFractionDigits:2,maximumFractionDigits:2}) },

    renderChart(){
      const el = document.getElementById('eqChart');
      if(!el)return;
      if(!this.chart) this.chart = echarts.init(el,'dark');
      let d = this.data.equity;
      if(this.eqRange>0) d = d.slice(-this.eqRange);
      this.chart.setOption({
        backgroundColor:'transparent',
        tooltip:{trigger:'axis',formatter:p=>{const v=p[0];return v.name+'<br/>净值: ¥'+Number(v.value).toLocaleString()}},
        grid:{left:70,right:20,top:20,bottom:30},
        xAxis:{type:'category',data:d.map(i=>i.date),axisLine:{lineStyle:{color:'#334155'}},axisLabel:{color:'#94a3b8',fontSize:10}},
        yAxis:{type:'value',axisLine:{lineStyle:{color:'#334155'}},axisLabel:{color:'#94a3b8',formatter:v=>'¥'+(v/10000).toFixed(1)+'万'},splitLine:{lineStyle:{color:'#1e293b'}}},
        series:[{type:'line',data:d.map(i=>i.total_value),smooth:true,lineStyle:{color:'#3b82f6',width:2},areaStyle:{color:new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:'rgba(59,130,246,0.3)'},{offset:1,color:'rgba(59,130,246,0)'}])},itemStyle:{color:'#3b82f6'}}],
      });
      window.onresize = () => this.chart?.resize();
    },

    async trade(){
      this.msg='';
      if(!this.code||!this.shares){this.msg='请输入代码和数量';this.msgOk=false;return}
      if(this.shares%100!==0){this.msg='数量必须是100的倍数';this.msgOk=false;return}
      try{
        const r=await fetch('/api/trade',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:this.mode,stock_code:this.code,shares:this.shares,reason:this.reason})});
        const d=await r.json();
        if(d.error){this.msg=d.error;this.msgOk=false}
        else{this.msg=(this.mode==='buy'?'买入':'卖出')+'成功！';this.msgOk=true;this.code='';this.shares=100;this.reason='';await this.load()}
      }catch(e){this.msg='失败: '+e.message;this.msgOk=false}
    },

    sellStock(code,shares){this.mode='sell';this.code=code;this.shares=shares},

    async analyze(){
      if(!this.queryCode)return;
      try{
        const r=await fetch('/api/analyze/'+this.queryCode);
        const d=await r.json();
        this.analyzeResult=d.error?null:d;
        this.result=null;
      }catch(e){this.analyzeResult=null}
    },
    async searchStocks(kw){
      if(!kw||kw.length<1){this.suggestions=[];return}
      try{
        const r=await fetch('/api/search?q='+encodeURIComponent(kw));
        this.suggestions=await r.json();
      }catch(e){this.suggestions=[]}
    }
  };
}
// 全局resize
window.addEventListener('resize',()=>{document.querySelectorAll('#eqChart').forEach(el=>{const c=echarts.getInstanceByDom(el);if(c)c.resize()})});
</script>
</body>
</html>
