<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🥚 蛋蛋基金 · 量化交易系统</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>
:root {
  --bg-deep: #07070d;
  --bg-surface: #0e0e16;
  --bg-card: #14141f;
  --bg-elevated: #1c1c2a;
  --border: #1e1e30;
  --border-light: #2a2a40;
  --text-primary: #e4e4f0;
  --text-secondary: #8a8aaa;
  --text-muted: #555570;
  --accent: #7c5cfc;
  --accent-light: #a78bfa;
  --accent-dim: rgba(124,92,252,0.12);
  --up: #34d399;
  --up-bg: rgba(52,211,153,0.06);
  --up-border: rgba(52,211,153,0.2);
  --down: #f87171;
  --down-bg: rgba(248,113,113,0.06);
  --down-border: rgba(248,113,113,0.2);
  --gold: #f59e0b;
  --gold-bg: rgba(245,158,11,0.08);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg-deep);
  color: var(--text-primary);
  font-family: -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Noto Sans SC',system-ui,sans-serif;
  height: 100vh; overflow: hidden;
  -webkit-font-smoothing: antialiased;
}
.mono { font-family: 'SF Mono','Fira Code','JetBrains Mono','Consolas',monospace; }
::-webkit-scrollbar { width: 3px; height: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 4px; }

.card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; }
.card-md { padding: 12px; }

.badge {
  display: inline-flex; align-items: center;
  padding: 1px 7px; border-radius: 999px;
  font-size: 9px; font-weight: 600; white-space: nowrap;
}
.badge-up { background: var(--up-bg); color: var(--up); border: 1px solid var(--up-border); }
.badge-down { background: var(--down-bg); color: var(--down); border: 1px solid var(--down-border); }
.badge-neutral { background: rgba(85,85,112,0.1); color: var(--text-muted); border: 1px solid var(--border-light); }
.badge-accent { background: var(--accent-dim); color: var(--accent-light); border: 1px solid rgba(124,92,252,0.25); }
.badge-gold { background: var(--gold-bg); color: var(--gold); border: 1px solid rgba(245,158,11,0.2); }

.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 4px;
  padding: 5px 12px; border-radius: 8px;
  font-size: 11px; font-weight: 600; cursor: pointer; border: none;
  transition: all 0.12s;
}
.btn-buy { background: var(--down); color: #fff; }
.btn-buy:hover { background: #ef4444; }
.btn-sell { background: var(--up); color: #fff; }
.btn-sell:hover { background: #10b981; }
.btn-accent { background: var(--accent); color: #fff; }
.btn-accent:hover { background: var(--accent-light); }
.btn-ghost { background: transparent; color: var(--text-secondary); border: 1px solid var(--border-light); }
.btn-ghost:hover { background: var(--bg-elevated); color: var(--text-primary); }

input {
  background: var(--bg-deep); border: 1px solid var(--border-light);
  color: var(--text-primary); padding: 6px 9px; border-radius: 7px;
  outline: none; font-size: 11px; transition: border-color 0.12s;
}
input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-dim); }
input::placeholder { color: var(--text-muted); }

table { width: 100%; border-collapse: collapse; }
th {
  text-align: left; padding: 4px 5px; color: var(--text-muted);
  font-size: 9px; font-weight: 600; letter-spacing: 0.08em;
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; background: var(--bg-card);
}
td { padding: 5px 5px; font-size: 11px; color: var(--text-secondary); border-bottom: 1px solid rgba(30,30,48,0.5); }
tr:last-child td { border-bottom: none; }
tr:hover td { background: rgba(255,255,255,0.012); color: var(--text-primary); }

.tab {
  padding: 2px 8px; cursor: pointer; font-size: 10px;
  color: var(--text-muted); border-radius: 5px; transition: all 0.12s;
}
.tab:hover { color: var(--text-secondary); background: rgba(255,255,255,0.02); }
.tab.active { color: var(--accent-light); background: var(--accent-dim); }

.s-line { width: 3px; height: 14px; border-radius: 2px; flex-shrink: 0; }

.s-drop {
  position: absolute; top: calc(100% + 2px); left: 0; right: 48px;
  background: var(--bg-elevated); border: 1px solid var(--border-light);
  border-radius: 8px; z-index: 100; max-height: 130px; overflow: auto;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}
.s-drop > div {
  padding: 5px 9px; cursor: pointer; font-size: 10px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid rgba(42,42,64,0.5);
}
.s-drop > div:last-child { border-bottom: none; }
.s-drop > div:hover { background: rgba(124,92,252,0.06); }

/* 策略选项卡 */
.strat-tab {
  display: inline-flex; align-items: center; gap: 3px;
  padding: 3px 9px; border-radius: 6px; cursor: pointer;
  font-size: 10px; font-weight: 500;
  color: var(--text-muted); border: 1px solid var(--border);
  background: var(--bg-deep); transition: all 0.12s;
}
.strat-tab:hover { color: var(--text-secondary); background: var(--bg-elevated); }
.strat-tab.active {
  color: var(--accent-light); background: var(--accent-dim);
  border-color: rgba(124,92,252,0.3);
}
.strat-badge {
  display: inline-flex; align-items: center;
  padding: 0 5px; border-radius: 4px;
  font-size: 8px; font-weight: 600;
  background: rgba(85,85,112,0.08);
}
.strat-active { color: var(--up); }
.strat-inactive { color: var(--text-muted); }

@keyframes fadeIn { from { opacity:0; transform:translateY(3px); } to { opacity:1; transform:translateY(0); } }
.fi { animation: fadeIn 0.25s ease; }
</style>
</head>
<body>

<div x-data="app()" x-init="init()">

<!-- ═══ TOP BAR ═══ -->
<header style="background:var(--bg-surface);border-bottom:1px solid var(--border);flex-shrink:0;">
  <div style="display:flex;align-items:center;height:38px;padding:0 14px;">
    <div style="display:flex;align-items:center;gap:8px;margin-right:12px">
      <div style="width:22px;height:22px;border-radius:7px;background:linear-gradient(135deg,#7c5cfc,#a78bfa);display:flex;align-items:center;justify-content:center;font-size:12px">🥚</div>
      <span style="font-size:12px;font-weight:700">蛋蛋基金</span>
      <span style="font-size:8px;color:var(--text-muted)">¥300K</span>
    </div>
    <template x-if="data.index.name">
      <div style="display:flex;align-items:center;gap:5px;padding:2px 8px;background:var(--bg-deep);border:1px solid var(--border);border-radius:7px;margin-right:8px">
        <span style="font-size:8px;font-weight:600;color:var(--text-secondary)" x-text="data.index.name"></span>
        <span class="mono font-bold" style="font-size:11px" :class="(data.index.change_pct||0)>=0?'up':'down'" x-text="(data.index.price||0).toFixed(2)"></span>
        <span style="font-size:9px" :class="(data.index.change_pct||0)>=0?'up':'down'" x-text="((data.index.change_pct||0)>=0?'+':'')+(data.index.change_pct||0).toFixed(2)+'%'"></span>
        <span class="badge" style="font-size:7px" :class="data.index.above_ma5?'badge-up':'badge-down'" x-text="data.index.above_ma5?'5↑':'5↓'"></span>
      </div>
    </template>
    <div style="display:flex;align-items:center;gap:10px;margin-left:auto">
      <div style="display:flex;align-items:center;gap:3px">
        <span style="font-size:8px;color:var(--text-muted)">现金</span>
        <span class="mono" style="font-size:11px;font-weight:500;color:var(--text-secondary)">¥<span x-text="fmt(data.account.cash)"></span></span>
      </div>
      <div style="display:flex;align-items:center;gap:3px">
        <span style="font-size:8px;color:var(--text-muted)">总资产</span>
        <span class="mono" style="font-size:11px;font-weight:700;color:var(--accent-light)">¥<span x-text="fmt(data.account.total_value)"></span></span>
      </div>
      <div style="display:flex;align-items:center;gap:3px">
        <span style="font-size:8px;color:var(--text-muted)">收益</span>
        <span class="mono" style="font-size:11px;font-weight:700" :class="(data.account.total_profit||0)>=0?'up':'down'">
          <span x-text="((data.account.total_profit||0)>=0?'+':'')+fmt(data.account.total_profit)"></span>
        </span>
      </div>
      <div style="display:flex;align-items:center;gap:3px">
        <span style="font-size:8px;color:var(--text-muted)">收益率</span>
        <span class="mono" style="font-size:11px;font-weight:700" :class="roi>=0?'up':'down'">
          <span x-text="(roi>=0?'+':'')+roi.toFixed(2)+'%'"></span>
        </span>
      </div>
      <span style="font-size:8px;color:var(--text-muted);margin-left:4px" x-text="lastUpdate"></span>
    </div>
  </div>
  
  <!-- ── 策略选择器 ── -->
  <div style="display:flex;align-items:center;gap:4px;padding:0 14px 6px 14px;flex-wrap:wrap">
    <button class="strat-tab" :class="currentStrategy===0&&'active'" @click="switchStrategy(0)">
      📊 总览
      <span class="strat-badge" x-text="data.account.total_value?fmt(data.account.total_value):'0'"></span>
    </button>
    <template x-for="s in strategies" :key="s.id">
      <button class="strat-tab" :class="currentStrategy===s.id&&'active'" @click="switchStrategy(s.id)">
        <span x-text="s.icon||'📈'"></span>
        <span x-text="s.name"></span>
        <span class="strat-badge" :class="s.is_active?'strat-active':'strat-inactive'" x-text="'¥'+(s.capital/10000).toFixed(0)+'万'"></span>
        <span class="strat-badge" style="background:var(--bg-deep);border:1px solid var(--border);color:var(--text-muted)" x-show="s.stats.total_trades>0" x-text="s.stats.total_trades+'笔'"></span>
        <span class="badge" style="font-size:7px;padding:1px 4px" :class="(s.stats.win_rate||0)>=50?'badge-up':'badge-down'" x-show="s.stats.total_trades>0" x-text="s.stats.win_rate+'%'"></span>
      </button>
    </template>
  </div>
</header>

<!-- ═══ BODY: 60/40 split (info / tools) ═══ -->
<div style="display:flex;gap:10px;padding:10px;height:calc(100vh - 42px);overflow:hidden">

  <!-- ═══ LEFT (60%): Chart + Positions + Trades ═══ -->
  <div style="width:60%;display:flex;flex-direction:column;gap:10px;overflow:hidden">

    <!-- ── Chart ── -->
    <div class="card card-md" style="flex:0 0 140px;display:flex;flex-direction:column">
      <div style="display:flex;align-items:center;justify-content:space-between;flex-shrink:0;margin-bottom:4px">
        <div style="display:flex;align-items:center;gap:6px">
          <div class="s-line" style="background:linear-gradient(180deg,#7c5cfc,#a78bfa)"></div>
          <span style="font-size:11px;font-weight:600">净值走势</span>
          <span class="badge badge-accent" x-show="data.stats.win_rate" x-text="'胜率 '+data.stats.win_rate+'%'"></span>
          <span class="badge" :class="(data.stats.win_rate||0)>=50?'badge-up':'badge-down'" x-show="data.stats.net_profit" x-text="'净利 ¥'+(data.stats.net_profit||0).toFixed(0)"></span>
        </div>
        <div style="display:flex;gap:2px">
          <button class="tab" :class="eqRange===7&&'active'" @click="eqRange=7;renderChart()">7D</button>
          <button class="tab" :class="eqRange===30&&'active'" @click="eqRange=30;renderChart()">30D</button>
          <button class="tab" :class="eqRange===60&&'active'" @click="eqRange=60;renderChart()">60D</button>
        </div>
      </div>
      <div id="eqChart" style="flex:1;min-height:0"></div>

    <!-- ── 策略表现概览（总览模式） ── -->
    <div class="card card-md" style="flex-shrink:0;padding:8px 12px" x-show="currentStrategy===0">
      <div style="display:flex;align-items:center;gap:4px;margin-bottom:6px">
        <div class="s-line" style="background:var(--gold)"></div>
        <span style="font-size:9px;font-weight:600;color:var(--text-secondary)">策略表现</span>
      </div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px">
        <template x-for="s in strategies" :key="s.id">
          <div style="padding:6px 8px;background:var(--bg-deep);border-radius:8px;border-left:3px solid;border-color:var(--accent)">
            <div style="display:flex;align-items:center;gap:3px;margin-bottom:3px">
              <span x-text="s.icon||'📈'"></span>
              <span style="font-size:10px;font-weight:600" x-text="s.name"></span>
              <span class="badge badge-neutral" style="font-size:7px;margin-left:auto" x-text="'¥'+(s.capital/10000).toFixed(0)+'万'"></span>
            </div>
            <div style="display:flex;gap:8px">
              <div>
                <div style="font-size:7px;color:var(--text-muted)">交易</div>
                <div class="mono" style="font-size:10px;font-weight:600" x-text="s.stats.total_trades||'0'"></div>
              </div>
              <div>
                <div style="font-size:7px;color:var(--text-muted)">胜率</div>
                <div class="mono" style="font-size:10px;font-weight:600" :class="(s.stats.win_rate||0)>=50?'up':'down'" x-text="(s.stats.win_rate||0)+'%'"></div>
              </div>
              <div>
                <div style="font-size:7px;color:var(--text-muted)">净利</div>
                <div class="mono" style="font-size:10px;font-weight:600" :class="(s.stats.net_profit||0)>=0?'up':'down'" x-text="'¥'+(s.stats.net_profit||0).toFixed(0)"></div>
              </div>
              <div>
                <div style="font-size:7px;color:var(--text-muted)">持仓</div>
                <div class="mono" style="font-size:10px;font-weight:600" x-text="s.position_count||'0'"></div>
              </div>
            </div>
          </div>
        </template>
      </div>
    </div>
    </div>

    <!-- ── Positions (compact card) + Mini trade panel ── -->
    <div class="card card-md" style="flex-shrink:0">
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px">
        <div class="s-line" style="background:var(--up)"></div>
        <span style="font-size:11px;font-weight:600">当前持仓</span>
        <span class="badge badge-neutral" x-text="Object.keys(data.positions).length"></span>
        <span style="flex:1"></span>
        <span style="font-size:9px;color:var(--text-muted)" x-show="Object.keys(data.positions).length">下一操作 · 明早09:30自动卖出</span>
        <span style="font-size:9px;color:var(--text-muted)" x-show="Object.keys(data.positions).length===0">下一操作 · 明早14:50自动选股</span>
      </div>

      <template x-for="(pos, code) in filteredPositions" :key="code">
        <div style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg-deep);border-radius:10px;margin-bottom:4px">
          <div style="width:36px;height:36px;border-radius:8px;background:linear-gradient(135deg,#34d399,#2dd4bf);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0">💎</div>
          <div style="flex:1">
            <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
              <span style="font-size:14px;font-weight:700;color:var(--text-primary)" x-text="pos.stock_name||code"></span>
              <span class="mono" style="font-size:10px;color:var(--text-muted)" x-text="code"></span>
              <span class="badge" style="font-size:8px;background:var(--accent-dim);border:1px solid var(--accent);color:var(--accent-light)" x-show="pos.strategy_id" x-text="strategies.find(s=>s.id===pos.strategy_id)?.name||''"></span>
              <span class="badge badge-up" style="font-size:8px">持仓中</span>
            </div>
            <div style="display:flex;gap:16px;margin-top:4px">
              <span style="font-size:11px;color:var(--text-secondary)"><span style="color:var(--text-muted)">数量</span> <span class="mono font-semibold" x-text="pos.shares+'股'"></span></span>
              <span style="font-size:11px;color:var(--text-secondary)"><span style="color:var(--text-muted)">成本</span> <span class="mono font-semibold" x-text="'¥'+Number(pos.avg_cost).toFixed(2)"></span></span>
              <span style="font-size:11px;color:var(--text-secondary)"><span style="color:var(--text-muted)">市值</span> <span class="mono font-semibold" x-text="'¥'+(pos.avg_cost*pos.shares).toFixed(0)"></span></span>
              <span style="font-size:11px" :class="(pos.profit||0)>=0?'up':'down'" x-show="pos.profit!=null"><span class="mono font-semibold">
                <span x-text="pos.profit>=0?'+':''"></span>¥<span x-text="pos.profit.toFixed(0)"></span>
              </span></span>
            </div>
          </div>
          <button class="btn btn-ghost" style="font-size:10px;padding:3px 10px" @click="sellStock(code, pos.shares)">手动卖</button>
        </div>
      </template>
      <div x-show="!hasPosition" style="text-align:center;padding:16px 0;color:var(--text-muted);font-size:11px">
        <div style="font-size:24px;margin-bottom:4px">🛌</div>
        <div x-show="currentStrategy===0">全仓空 · 自动策略等待尾盘信号</div>
        <div x-show="currentStrategy>0">此策略暂无持仓</div>
      </div>
    </div>

    <!-- ── Trades ── -->
    <div class="card card-md" style="flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0">
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px;flex-shrink:0">
        <div class="s-line" style="background:var(--accent)"></div>
        <span style="font-size:11px;font-weight:600">交易记录</span>
        <span class="badge badge-neutral" x-text="(data.trades||[]).length"></span>
        <span style="flex:1"></span>
        <button class="tab" :class="tradesFilter==='all'&&'active'" @click="tradesFilter='all'">全部</button>
        <button class="tab" :class="tradesFilter==='buy'&&'active'" @click="tradesFilter='buy'">买入</button>
        <button class="tab" :class="tradesFilter==='sell'&&'active'" @click="tradesFilter='sell'">卖出</button>
      </div>
      <div style="overflow:auto;flex:1">
        <table>
          <thead><tr><th>日期</th><th>名称</th><th>买卖</th><th>价格</th><th>金额</th><th>盈亏</th><th>策略</th><th>理由</th></tr></thead>
          <tbody>
            <template x-for="t in filteredTrades" :key="t.id">
              <tr>
                <td class="mono" style="font-size:9px" x-text="t.timestamp.slice(5,16)"></td>
                <td style="font-size:10px;font-weight:500" x-text="t.stock_name||t.stock_code"></td>
                <td><span class="badge" :class="t.action==='buy'?'badge-down':'badge-up'" x-text="t.action==='buy'?'买':'卖'"></span></td>
                <td class="mono" style="font-size:10px" x-text="'¥'+Number(t.price).toFixed(2)"></td>
                <td class="mono" style="font-size:10px" x-text="'¥'+(t.amount||0).toFixed(0)"></td>
                <td class="mono" style="font-size:10px;font-weight:500" :class="(t.profit||0)>0?'up':(t.profit||0)<0?'down':''" x-text="t.profit?((t.profit>0?'+':'')+Number(t.profit).toFixed(0)):'-'"></td>
                <td style="font-size:9px;color:var(--text-secondary)" x-show="t.strategy_id" x-text="strategies.find(s=>s.id===t.strategy_id)?.name||''"></td>
                <td style="font-size:9px;color:var(--text-muted);max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" x-text="(t.reason||'').slice(0,20)"></td>
              </tr>
            </template>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- ═══ RIGHT (40%): Analysis + Reviews + Mini Trade ═══ -->
  <div style="width:40%;display:flex;flex-direction:column;gap:10px;overflow:hidden">

    <!-- ── Stock Analysis ── -->
    <div class="card card-md" style="flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0">
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px;flex-shrink:0">
        <div class="s-line" style="background:linear-gradient(180deg,#f59e0b,#f97316)"></div>
        <span style="font-size:11px;font-weight:600">🔍 价值分析</span>
      </div>
      <div style="position:relative;flex-shrink:0;margin-bottom:6px;display:flex;gap:6px">
        <input type="text" placeholder="输入代码或名称" x-model="queryCode"
          @input="debounceSearch()" @focus="showSuggestions=true"
          @keydown.enter="showSuggestions=false;analyze()" @keydown.escape="showSuggestions=false">
        <button class="btn btn-accent" @click="showSuggestions=false;analyze()" style="flex-shrink:0">分析</button>
        <div x-show="showSuggestions && suggestions.length" class="s-drop">
          <template x-for="s in suggestions" :key="s.code">
            <div @click="queryCode=s.code;showSuggestions=false;analyze()">
              <span style="color:var(--text-primary)" x-text="s.name"></span>
              <span style="color:var(--text-muted);font-family:monospace;font-size:10px" x-text="s.code"></span>
            </div>
          </template>
        </div>
      </div>
      <div x-show="analyzing" style="text-align:center;padding:12px 0;color:var(--text-muted)">
        <div style="font-size:14px;animation:pulse 1.5s infinite">🔄</div>
        <div style="font-size:9px;margin-top:3px">分析中...</div>
      </div>
      <div x-show="analyzeResult && !analyzing" class="fi" style="overflow:auto;flex:1">
        <template x-if="analyzeResult">
          <div>
            <div style="display:flex;align-items:center;gap:6px;padding:8px 10px;background:var(--bg-deep);border-radius:8px;margin-bottom:6px">
              <div style="flex:1">
                <div style="display:flex;align-items:center;gap:4px">
                  <span style="font-size:13px;font-weight:700" x-text="analyzeResult.name"></span>
                  <span class="badge" style="font-size:7px" :class="(analyzeResult.indicators?.PE?.value||0)>40?'badge-down':'badge-up'" x-text="'PE '+(analyzeResult.indicators?.PE?.value||'N/A')+'x'"></span>
                </div>
                <div style="font-size:9px;color:var(--text-secondary);margin-top:2px" x-text="'⭐'.repeat(Math.min(analyzeResult.stars||0,5))+' '+analyzeResult.rating+(analyzeResult.action?' | '+analyzeResult.action:'')"></div>
              </div>
              <div style="text-align:right">
                <div class="mono text-sm font-bold" :class="(analyzeResult.indicators?.PE?.value||0)>50?'down':'up'" x-text="analyzeResult.current_price+'元'"></div>
              </div>
            </div>
            <div style="margin-bottom:6px"><div style="display:flex;justify-content:space-between;margin-bottom:2px"><span style="font-size:8px;color:var(--text-muted)">评分</span><span class="mono text-xs font-bold" style="color:var(--accent-light)" x-text="(analyzeResult.total_score||0)+''"></span></div>
              <div style="height:4px;background:var(--border);border-radius:2px;overflow:hidden">
                <div :style="'height:100%;border-radius:2px;width:'+(analyzeResult.total_score||0)+'%;background:'+((analyzeResult.total_score||0)>=70?'#34d399':(analyzeResult.total_score||0)>=45?'#f59e0b':'#f87171')"></div>
              </div>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:3px;margin-bottom:6px">
              <div style="padding:5px 7px;background:var(--bg-deep);border-radius:6px"><div style="font-size:8px;color:var(--text-muted)">PE</div><div class="mono font-bold text-xs" :class="(analyzeResult.indicators?.PE?.value||0)>40?'down':'up'" x-text="(analyzeResult.indicators?.PE?.value||'N/A')+'x'"></div></div>
              <div style="padding:5px 7px;background:var(--bg-deep);border-radius:6px"><div style="font-size:8px;color:var(--text-muted)">ROE</div><div class="mono font-bold text-xs" :class="(analyzeResult.indicators?.ROE?.value||0)>=15?'up':'down'" x-text="(analyzeResult.indicators?.ROE?.value||'N/A')+'%'"></div></div>
              <div style="padding:5px 7px;background:var(--bg-deep);border-radius:6px"><div style="font-size:8px;color:var(--text-muted)">毛利率</div><div class="mono font-bold text-xs" x-text="(analyzeResult.indicators?.毛利率?.value||'N/A')+'%'"></div></div>
            </div>
            <div x-show="analyzeResult.target_price" style="display:grid;grid-template-columns:1fr 1fr;gap:3px;margin-bottom:5px">
              <div style="padding:5px;background:var(--up-bg);border:1px solid var(--up-border);border-radius:6px;text-align:center"><div style="font-size:8px;color:var(--up)">目标价</div><div class="mono font-bold text-xs" style="color:var(--up)" x-text="'¥'+(analyzeResult.target_price||'?')"></div></div>
              <div style="padding:5px;background:var(--down-bg);border:1px solid var(--down-border);border-radius:6px;text-align:center"><div style="font-size:8px;color:var(--down)">止损价</div><div class="mono font-bold text-xs" style="color:var(--down)" x-text="'¥'+(analyzeResult.stop_price||'?')"></div></div>
            </div>
            <div x-show="analyzeResult.eps_warning" style="padding:4px 7px;background:var(--gold-bg);border:1px solid rgba(245,158,11,0.2);border-radius:6px;margin-bottom:5px;display:flex;align-items:center;gap:4px"><span style="font-size:9px">⚠️</span><span style="font-size:8px;color:var(--gold)" x-text="analyzeResult.eps_warning"></span></div>
            <div style="padding:6px 8px;background:var(--bg-deep);border-radius:6px;font-size:9px;color:var(--text-secondary);line-height:1.5" x-text="analyzeResult.summary||''"></div>
          </div>
        </template>
      </div>
      <div x-show="!analyzeResult && !analyzing" style="text-align:center;padding:16px 0;color:var(--text-muted);font-size:10px">
        <div style="font-size:20px;margin-bottom:4px">📊</div>
        <div>输入代码查询价值投资分析</div>
      </div>
    </div>

    <!-- ── Reviews + Mini Trade Panel ── -->
    <div style="display:flex;gap:10px;flex-shrink:0;height:240px">

      <!-- Reviews -->
      <div class="card card-md" style="flex:1;display:flex;flex-direction:column;overflow:hidden">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px;flex-shrink:0">
          <div class="s-line" style="background:var(--gold)"></div>
          <span style="font-size:10px;font-weight:600">复盘日志</span>
          <span class="badge badge-neutral" x-text="reviewList.length"></span>
        </div>
        <div style="overflow:auto;flex:1;display:flex;flex-direction:column;gap:3px">
          <template x-for="r in reviewList" :key="r.id||r.date">
            <div style="padding:5px 7px;background:var(--bg-deep);border-radius:6px;border-left:2px solid var(--accent)" class="fi">
              <div style="display:flex;align-items:center;gap:4px;margin-bottom:1px">
                <span class="mono" style="font-size:8px;color:var(--text-muted)" x-text="r.date"></span>
                <template x-if="r.profit">
                  <span class="mono text-xs font-medium" :class="(r.profit||0)>=0?'up':'down'" x-text="((r.profit||0)>0?'+':'')+Number(r.profit||0).toFixed(0)+'元'"></span>
                </template>
              </div>
              <div style="font-size:9px;color:var(--text-secondary);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden" x-text="(r.content||'').replace(/\*\*/g,'').slice(0,100)"></div>
            </div>
          </template>
          <div x-show="reviewList.length===0" style="text-align:center;padding:12px;color:var(--text-muted);font-size:9px">暂无复盘</div>
        </div>
      </div>

      <!-- Mini Trade Panel (fallback only) -->
      <div class="card card-md" style="flex:0 0 160px;display:flex;flex-direction:column">
        <div style="display:flex;align-items:center;gap:4px;margin-bottom:6px;flex-shrink:0">
          <div class="s-line" style="background:var(--text-muted)"></div>
          <span style="font-size:9px;font-weight:500;color:var(--text-muted)">手动交易</span>
        </div>
        <div style="display:flex;gap:4px;margin-bottom:6px;flex-shrink:0">
          <button class="btn" :class="mode==='buy'?'btn-buy':'btn-ghost'" @click="mode='buy';msg=''" style="flex:1;padding:4px;font-size:10px">买入</button>
          <button class="btn" :class="mode==='sell'?'btn-sell':'btn-ghost'" @click="mode='sell';msg=''" style="flex:1;padding:4px;font-size:10px">卖出</button>
        </div>
        <div style="display:flex;flex-direction:column;gap:4px;flex:1">
          <input type="text" placeholder="代码" x-model="code" style="font-size:10px;padding:4px 7px">
          <div style="display:flex;gap:4px">
            <input type="number" placeholder="股数" x-model="shares" min="100" step="100" style="font-size:10px;padding:4px 7px;flex:1">
            <button class="btn btn-ghost" style="padding:4px 6px;font-size:9px" @click="sellAll()" x-show="mode=='sell'">全仓</button>
          </div>
          <div x-show="msg" style="padding:3px 7px;border-radius:4px;font-size:9px" :class="msgOk?'up-bg':'down-bg'" :style="'color:'+(msgOk?'var(--up)':'var(--down)')" x-text="msg"></div>
          <div style="flex:1"></div>
          <button class="btn" :class="mode==='buy'?'btn-buy':'btn-sell'" style="width:100%;padding:5px;font-size:10px" @click="trade()">
            <span x-text="mode==='buy'?'确认':'确认'"></span>
          </button>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
function app(){
  return {
    data: { account: {cash:0,total_value:300000,total_profit:0}, positions: {}, trades: [], reviews: [], equity: [], index: {}, stats: {} },
    strategies: [], currentStrategy: 0,
    eqRange: 30, chart: null, lastUpdate: '-',
    mode: 'buy', code: '', shares: 100, reason: '', msg: '', msgOk: false,
    queryCode: '', result: null, analyzeResult: null, suggestions: [], showSuggestions: false, analyzing: false,
    tradesFilter: 'all', debounceSearch: null,

    get roi(){ return ((this.data.account.total_value-300000)/300000)*100 },
    get currentStratName(){
      if(this.currentStrategy===0) return '总览';
      const s=this.strategies.find(x=>x.id===this.currentStrategy);
      return s?s.name:'策略';
    },
    get currentStratStats(){
      if(this.currentStrategy===0) return null;
      const s=this.strategies.find(x=>x.id===this.currentStrategy);
      return s?s.stats:null;
    },
    get filteredTrades(){
      let t = this.data.trades||[];
      if(this.currentStrategy>0) t=t.filter(x=>x.strategy_id===this.currentStrategy);
      if(this.tradesFilter==='all') return t.slice(0,15);
      return t.filter(x=>x.action===this.tradesFilter).slice(0,15);
    },
    get filteredPositions(){
      const p=this.data.positions||{};
      if(this.currentStrategy===0) return p;
      const r={};
      for(const k in p){ if(p[k].strategy_id===this.currentStrategy) r[k]=p[k]; }
      return r;
    },
    get hasPosition(){ return Object.keys(this.filteredPositions).length>0 },
    get reviewList(){ return Array.isArray(this.data.reviews)?this.data.reviews.slice(0,6):[] },

    async init(){
      let t; this.debounceSearch = ()=>{ clearTimeout(t); t=setTimeout(()=>this.searchStocks(this.queryCode),300); };
      await this.load(); setInterval(()=>this.load(),30000);
    },

    async switchStrategy(id){
      this.currentStrategy=id;
      await this.load();
    },

    async load(){
      try {
        const r=await fetch('/api/dashboard'); const d=await r.json();
        if(d.error) return;
        this.data.account=d.account||{cash:0,total_value:300000,total_profit:0};
        this.data.positions=d.positions||{}; this.data.trades=d.trades||[];
        this.data.reviews=(d.reviews?.reviews)?d.reviews.reviews:(Array.isArray(d.reviews)?d.reviews:[]);
        this.data.equity=d.equity||[]; this.data.index=d.index||{}; this.data.stats=d.stats||{};
        
        // 如果选了具体策略，获取该策略专属净值
        if(this.currentStrategy>0){
          try{
            const er=await fetch('/api/equity?strategy_id='+this.currentStrategy); const ed=await er.json();
            if(Array.isArray(ed)&&ed.length) this.data.equity=ed;
          }catch(e){}
        }
        
        this.renderChart(); this.lastUpdate=new Date().toLocaleTimeString('zh-CN',{hour12:false});
        
        // 加载策略信息
        try{
          const sr=await fetch('/api/strategies'); const sd=await sr.json();
          if(Array.isArray(sd)){
            const icons={overnight:'⚡',value:'🏦',trend:'📈'};
            this.strategies=sd.map(x=>({...x,icon:icons[x.type]||'📊'}));
          }
        }catch(e){}
      }catch(e){}
    },
    fmt(n){ if(n==null)return'0.00'; return Number(n).toLocaleString('zh-CN',{minimumFractionDigits:2,maximumFractionDigits:2}) },

    renderChart(){
      const el=document.getElementById('eqChart'); if(!el)return;
      if(!this.chart) this.chart=echarts.init(el,'dark');
      let d=this.data.equity; if(this.eqRange>0) d=d.slice(-this.eqRange);
      this.chart.setOption({
        backgroundColor:'transparent',tooltip:{trigger:'axis',formatter:p=>p[0].name+'<br/>¥'+Number(p[0].value).toLocaleString()},
        grid:{left:45,right:8,top:6,bottom:18},
        xAxis:{type:'category',data:d.map(i=>i.date),axisLine:{lineStyle:{color:'#1e1e30'}},axisLabel:{color:'#555570',fontSize:7}},
        yAxis:{type:'value',axisLine:{lineStyle:{color:'#1e1e30'}},axisLabel:{color:'#555570',fontSize:7,formatter:v=>'¥'+(v/10000).toFixed(1)+'万'},splitLine:{lineStyle:{color:'#12121e'}}},
        series:[{type:'line',data:d.map(i=>i.total_value),smooth:true,lineStyle:{color:'#7c5cfc',width:1.5},areaStyle:{color:new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:'rgba(124,92,252,0.2)'},{offset:1,color:'rgba(124,92,252,0)'}])},itemStyle:{color:'#7c5cfc'},symbol:'none'}]
      });
    },
    async trade(){
      this.msg=''; if(!this.code||!this.shares){this.msg='请输入代码和数量';this.msgOk=false;return}
      if(this.shares%100!==0){this.msg='数量须为100的倍数';this.msgOk=false;return}
      try{
        const r=await fetch('/api/trade',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:this.mode,stock_code:this.code,shares:this.shares,reason:this.reason})});
        const d=await r.json();
        if(d.error){this.msg=d.error;this.msgOk=false}
        else{this.msg=(this.mode==='buy'?'✅ 买入成功':'✅ 卖出成功');this.msgOk=true;this.code='';this.shares=100;this.reason='';await this.load()}
      }catch(e){this.msg='失败: '+e.message;this.msgOk=false}
    },
    sellStock(code,shares){this.mode='sell';this.code=code;this.shares=shares},
    sellAll(){ const p=Object.entries(this.data.positions); if(p.length){this.sellStock(p[0][0],p[0][1].shares)} },
    async analyze(){
      if(!this.queryCode)return;
      this.analyzing=true;this.analyzeResult=null;
      try{const r=await fetch('/api/analyze/'+this.queryCode,{signal:AbortSignal.timeout(120000)});const d=await r.json();this.analyzeResult=d.error?null:d;this.result=null}
      catch(e){this.analyzeResult=null}
      finally{this.analyzing=false}
    },
    async searchStocks(kw){ if(!kw||kw.length<1){this.suggestions=[];return} try{const r=await fetch('/api/search?q='+encodeURIComponent(kw));this.suggestions=await r.json()}catch(e){this.suggestions=[]} }
  };
}
window.addEventListener('resize',()=>{document.querySelectorAll('#eqChart').forEach(el=>{const c=echarts.getInstanceByDom(el);if(c)c.resize()})});
</script>
</body>
</html>
