<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📊 交易状态卡片</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            padding: 1rem;
            color: #f1f5f9;
        }
        .card {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid #334155;
            border-radius: 16px;
            padding: 1.5rem;
            max-width: 400px;
            margin: 0 auto;
            backdrop-filter: blur(10px);
        }
        .card-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #334155;
        }
        .egg { font-size: 2.5rem; }
        .card-title { font-size: 1.1rem; font-weight: 700; color: white; }
        .card-subtitle { font-size: 0.8rem; color: #94a3b8; }
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.3rem 0.8rem;
            border-radius: 999px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 1rem;
        }
        .status-idle { background: #166534; color: #86efac; }
        .status-researching { background: #1e40af; color: #93c5fd; }
        .status-writing { background: #7c2d12; color: #fed7aa; }
        .status-executing { background: #7c2d12; color: #fca5a5; }
        .status-error { background: #991b1b; color: #fca5a5; }
        .status-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: currentColor;
        }
        .status-dot.pulse { animation: pulse 1.5s ease-in-out infinite; }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.6rem 0;
            border-bottom: 1px solid rgba(51, 65, 85, 0.5);
        }
        .stat-row:last-child { border-bottom: none; }
        .stat-label { color: #94a3b8; font-size: 0.85rem; }
        .stat-value { font-weight: 700; font-size: 0.95rem; }
        .stat-value.positive { color: #86efac; }
        .stat-value.negative { color: #fca5a5; }
        .stat-value.neutral { color: #f1f5f9; }
        .positions { margin-top: 1rem; }
        .positions-title { font-size: 0.8rem; color: #64748b; margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.05em; }
        .position-item {
            background: rgba(51, 65, 85, 0.5);
            border-radius: 8px;
            padding: 0.6rem 0.8rem;
            margin-bottom: 0.4rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .position-code { font-weight: 600; font-size: 0.85rem; }
        .position-shares { color: #64748b; font-size: 0.75rem; }
        .position-pnl { font-weight: 700; font-size: 0.85rem; }
        .no-position { color: #64748b; font-size: 0.85rem; text-align: center; padding: 1rem; }
        .footer { margin-top: 1rem; padding-top: 1rem; border-top: 1px solid #334155; font-size: 0.7rem; color: #475569; text-align: center; }
        .error-msg { background: rgba(239, 68, 68, 0.2); border: 1px solid #ef4444; border-radius: 8px; padding: 0.8rem; color: #fca5a5; font-size: 0.85rem; text-align: center; }
        .loading { text-align: center; padding: 2rem; color: #64748b; }
        .refresh-btn {
            background: #1e40af;
            border: none;
            color: white;
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            font-size: 0.75rem;
            cursor: pointer;
            margin-left: auto;
        }
        .refresh-btn:hover { background: #1d4ed8; }
    </style>
</head>
<body>
    <div class="card">
        <div class="card-header">
            <span class="egg">🥚</span>
            <div>
                <div class="card-title">蛋蛋交易账户</div>
                <div class="card-subtitle">模拟账户 · 5万元</div>
            </div>
            <button class="refresh-btn" onclick="loadData()">🔄 刷新</button>
        </div>

        <div id="content">
            <div class="loading">加载中...</div>
        </div>

        <div class="footer">
            最后更新：<span id="last-updated">--</span> · 蛋蛋交易系统 v2.0
        </div>
    </div>

    <script>
        const STATUS_LABELS = {
            'idle': '待命中',
            'researching': '分析中',
            'writing': '执行中',
            'executing': '下单中',
            'syncing': '同步中',
            'receiving': '接收中',
            'replying': '回复中',
            'error': '异常'
        };

        async function loadData() {
            const content = document.getElementById('content');
            content.innerHTML = '<div class="loading">加载中...</div>';

            try {
                // 并行获取状态和账户数据
                const [agentRes, portfolioRes] = await Promise.all([
                    fetch('/api/agent_status'),
                    fetch('/api/portfolio')
                ]);

                const agent = await agentRes.json();
                const portfolio = await portfolioRes.json();

                // Agent 状态
                const stateLabel = STATUS_LABELS[agent.state] || agent.state;
                const isActive = ['researching', 'writing', 'executing', 'syncing'].includes(agent.state);
                const statusClass = `status-${agent.state}`;
                const statusHtml = `
                    <div class="status-badge ${statusClass}">
                        <span class="status-dot ${isActive ? 'pulse' : ''}"></span>
                        ${stateLabel}
                    </div>
                    ${agent.detail ? `<div style="color:#94a3b8;font-size:0.8rem;margin-bottom:1rem">${agent.detail}</div>` : ''}
                `;

                // 账户数据
                const cash = portfolio.cash || 0;
                const total = portfolio.total_value || cash;
                const pnl = total - 50000;
                const pnlPct = (pnl / 50000 * 100).toFixed(2);
                const pnlClass = pnl > 0 ? 'positive' : pnl < 0 ? 'negative' : 'neutral';
                const pnlSign = pnl >= 0 ? '+' : '';

                // 持仓
                const positions = portfolio.positions || {};
                const positionKeys = Object.keys(positions);
                let positionsHtml = '';
                if (positionKeys.length === 0) {
                    positionsHtml = '<div class="no-position">暂无持仓（空仓观望中）</div>';
                } else {
                    positionsHtml = '<div class="positions-title">持仓</div>';
                    for (const [code, pos] of Object.entries(positions)) {
                        const pnlPos = (pos.current_price - pos.avg_cost) * pos.shares;
                        const pnlPosPct = (pnlPos / (pos.avg_cost * pos.shares) * 100).toFixed(2);
                        const pnlPosClass = pnlPos > 0 ? 'positive' : pnlPos < 0 ? 'negative' : 'neutral';
                        positionsHtml += `
                            <div class="position-item">
                                <div>
                                    <div class="position-code">${code}</div>
                                    <div class="position-shares">${pos.shares}股 · 成本¥${pos.avg_cost.toFixed(2)}</div>
                                </div>
                                <div class="position-pnl ${pnlPosClass}">${pnlPos >= 0 ? '+' : ''}¥${pnlPos.toFixed(0)}<br><span style="font-size:0.7rem">${pnlPosPct >= 0 ? '+' : ''}${pnlPosPct}%</span></div>
                            </div>
                        `;
                    }
                }

                // 组装
                content.innerHTML = `
                    ${statusHtml}
                    <div class="stat-row">
                        <span class="stat-label">现金</span>
                        <span class="stat-value neutral">¥${cash.toFixed(0)}</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">总市值</span>
                        <span class="stat-value neutral">¥${total.toFixed(0)}</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">账户盈亏</span>
                        <span class="stat-value ${pnlClass}">${pnlSign}¥${pnl.toFixed(0)} (${pnlSign}${pnlPct}%)</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">持仓数量</span>
                        <span class="stat-value neutral">${positionKeys.length} 只</span>
                    </div>
                    ${positionsHtml}
                `;

                // 更新时间
                document.getElementById('last-updated').textContent = new Date().toLocaleTimeString('zh-CN');

            } catch (e) {
                content.innerHTML = `<div class="error-msg">加载失败: ${e.message}</div>`;
            }
        }

        // 首次加载
        loadData();

        // 每30秒自动刷新
        setInterval(loadData, 30000);
    </script>
</body>
</html>
