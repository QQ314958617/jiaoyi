<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🥚 蛋蛋爱挣钱系统</title>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        :root {
            --bg-primary: #0a0e17;
            --bg-card: #111827;
            --bg-card-hover: #1a2235;
            --border: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #94a3b8;
            --accent-blue: #3b82f6;
            --accent-purple: #8b5cf6;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --accent-orange: #f59e0b;
            --accent-cyan: #06b6d4;
            --gradient-primary: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            --gradient-green: linear-gradient(135deg, #10b981 0%, #059669 100%);
            --gradient-red: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* Header */
        .app-header {
            background: linear-gradient(180deg, #0f172a 0%, var(--bg-primary) 100%);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(12px);
        }
        
        .header-brand {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        
        .header-brand h1 {
            font-size: 1.25rem;
            font-weight: 700;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .header-time {
            font-size: 0.875rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .btn-refresh {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .btn-refresh:hover {
            background: var(--bg-card-hover);
            border-color: var(--accent-blue);
        }
        
        .btn-refresh .icon { transition: transform 0.5s ease; }
        .btn-refresh .icon.spinning { animation: spin 0.8s linear infinite; }
        
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Main Container */
        .main-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1.5rem 2rem;
        }

        /* Cards */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem;
            transition: all 0.2s;
        }
        
        .card:hover {
            border-color: rgba(59, 130, 246, 0.3);
        }

        .stat-card {
            position: relative;
            overflow: hidden;
        }
        
        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--gradient-primary);
            opacity: 0;
            transition: opacity 0.2s;
        }
        
        .stat-card:hover::before { opacity: 1; }

        .stat-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            font-weight: 600;
            margin-bottom: 0.5rem;
        }
        
        .stat-value {
            font-size: 1.75rem;
            font-weight: 700;
            line-height: 1.2;
        }
        
        .stat-sub {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 0.25rem;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        
        @media (max-width: 992px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
        }
        
        @media (max-width: 576px) {
            .stats-grid { grid-template-columns: 1fr; }
        }

        .up { color: var(--accent-green); }
        .down { color: var(--accent-red); }
        .neutral { color: var(--text-secondary); }
        
        .text-green { color: var(--accent-green) !important; }
        .text-red { color: var(--accent-red) !important; }
        .text-blue { color: var(--accent-blue) !important; }

        /* Tabs */
        .nav-tabs-custom {
            display: flex;
            gap: 0.25rem;
            background: var(--bg-card);
            padding: 0.25rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            border: 1px solid var(--border);
            overflow-x: auto;
        }
        
        .nav-tab {
            padding: 0.75rem 1.25rem;
            border-radius: 8px;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
            border: none;
            background: transparent;
        }
        
        .nav-tab:hover { color: var(--text-primary); background: var(--bg-card-hover); }
        .nav-tab.active { 
            background: var(--gradient-primary); 
            color: white;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .tab-panel { display: none; }
        .tab-panel.active { display: block; }

        /* Table */
        .data-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .data-table th {
            text-align: left;
            padding: 0.75rem 1rem;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            font-weight: 600;
            border-bottom: 1px solid var(--border);
        }
        
        .data-table td {
            padding: 1rem;
            border-bottom: 1px solid var(--border);
            font-size: 0.875rem;
        }
        
        .data-table tr:last-child td { border-bottom: none; }
        .data-table tbody tr:hover { background: var(--bg-card-hover); }

        .stock-name { font-weight: 600; color: var(--text-primary); }
        .stock-code { font-size: 0.75rem; color: var(--text-secondary); }

        /* Buttons */
        .btn-buy {
            background: var(--gradient-red);
            color: white;
            border: none;
            padding: 0.4rem 0.75rem;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-buy:hover { opacity: 0.9; transform: translateY(-1px); }
        
        .btn-sell {
            background: var(--gradient-green);
            color: white;
            border: none;
            padding: 0.4rem 0.75rem;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-sell:hover { opacity: 0.9; transform: translateY(-1px); }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
        }
        .modal-overlay.show { display: flex; }
        
        .modal-box {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem;
            min-width: 380px;
            max-width: 500px;
            animation: modalIn 0.2s ease;
        }
        
        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.95) translateY(-10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        
        .modal-box h3 {
            font-size: 1.125rem;
            font-weight: 600;
            margin-bottom: 1rem;
        }
        
        .form-input {
            width: 100%;
            padding: 0.75rem 1rem;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 0.875rem;
            margin-bottom: 0.75rem;
            transition: border-color 0.2s;
        }
        .form-input:focus { outline: none; border-color: var(--accent-blue); }
        
        .modal-actions {
            display: flex;
            gap: 0.5rem;
            justify-content: flex-end;
            margin-top: 1rem;
        }
        
        .btn-cancel {
            background: var(--bg-card-hover);
            color: var(--text-primary);
            border: 1px solid var(--border);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-size: 0.875rem;
            cursor: pointer;
        }
        
        .btn-confirm {
            background: var(--gradient-primary);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
        }

        /* Chart */
        .chart-box {
            height: 320px;
            margin-top: 1rem;
        }

        /* Trade Panel */
        .ai-decision-box {
            background: linear-gradient(135deg, rgba(59,130,246,0.1) 0%, rgba(139,92,246,0.1) 100%);
            border: 1px solid rgba(59, 130, 246, 0.2);
            border-radius: 12px;
            padding: 1.25rem;
            margin-bottom: 1rem;
        }
        
        .ai-decision-text {
            line-height: 1.8;
            color: var(--text-secondary);
            font-size: 0.875rem;
            white-space: pre-wrap;
        }
        
        .btn-ai {
            background: var(--gradient-primary);
            color: white;
            border: none;
            padding: 0.6rem 1.25rem;
            border-radius: 8px;
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-ai:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(59,130,246,0.3); }

        /* Market List */
        .market-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.875rem 0;
            border-bottom: 1px solid var(--border);
        }
        .market-item:last-child { border-bottom: none; }
        .market-item:hover { background: var(--bg-card-hover); margin: 0 -1.5rem; padding: 0.875rem 1.5rem; cursor: pointer; border-radius: 8px; }
        
        .market-name { font-weight: 600; font-size: 0.875rem; color: var(--text-primary); }
        .market-code { font-size: 0.75rem; color: var(--text-muted); }
        
        .market-price { font-weight: 600; font-size: 0.875rem; color: var(--text-primary); }
        .market-change { font-size: 0.75rem; font-weight: 600; text-align: right; }

        /* Review */
        .review-item {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.25rem;
            margin-bottom: 1rem;
        }
        
        .review-date {
            font-size: 0.75rem;
            color: var(--accent-blue);
            font-weight: 600;
            margin-bottom: 0.5rem;
        }
        
        .review-content {
            font-size: 0.875rem;
            color: var(--text-secondary);
            line-height: 1.7;
        }
        
        .review-tag {
            display: inline-block;
            background: rgba(59, 130, 246, 0.15);
            color: var(--accent-blue);
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 600;
            margin-right: 0.25rem;
            margin-top: 0.5rem;
        }

        /* Search Bar */
        .search-bar {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 1rem;
        }
        
        .search-input {
            flex: 1;
            padding: 0.75rem 1rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 0.875rem;
        }
        .search-input:focus { outline: none; border-color: var(--accent-blue); }
        
        .btn-add {
            background: var(--gradient-green);
            color: white;
            border: none;
            padding: 0.75rem 1.25rem;
            border-radius: 8px;
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
        }

        /* Stats Row */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        
        @media (max-width: 768px) {
            .stats-row { grid-template-columns: repeat(2, 1fr); }
        }
        
        .mini-stat {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1rem;
            text-align: center;
        }
        
        .mini-stat-value {
            font-size: 1.5rem;
            font-weight: 700;
        }
        
        .mini-stat-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-top: 0.25rem;
        }

        /* Footer */
        .app-footer {
            text-align: center;
            padding: 2rem;
            color: var(--text-muted);
            font-size: 0.75rem;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="app-header">
        <div style="display:flex; justify-content:space-between; align-items:center; max-width:1400px; margin:0 auto;">
            <div class="header-brand">
                <span style="font-size:1.5rem">🥚</span>
                <h1>蛋蛋模拟炒股</h1>
                <span class="header-time" id="clock">--:--:--</span>
            </div>
            <button class="btn-refresh" onclick="refreshAll()">
                <span class="icon" id="refresh-icon">🔄</span>
                <span>刷新数据</span>
            </button>
        </div>
    </header>

    <main class="main-container">
        <!-- Stats Overview -->
        <div class="stats-grid">
            <div class="card stat-card">
                <div class="stat-label">总资产</div>
                <div class="stat-value text-blue" id="total-value">--</div>
                <div class="stat-sub">初始: 5万</div>
            </div>
            <div class="card stat-card">
                <div class="stat-label">总收益</div>
                <div class="stat-value" id="total-profit">--</div>
                <div class="stat-sub" id="profit-rate">--</div>
            </div>
            <div class="card stat-card">
                <div class="stat-label">持仓市值</div>
                <div class="stat-value text-blue" id="position-value">--</div>
                <div class="stat-sub" id="position-count">0只股票</div>
            </div>
            <div class="card stat-card">
                <div class="stat-label">可用资金</div>
                <div class="stat-value text-blue" id="cash">--</div>
                <div class="stat-sub">今日操作: <span id="today-trades">0</span>次</div>
            </div>
        </div>

        <!-- Nav Tabs -->
        <div class="nav-tabs-custom">
            <button class="nav-tab active" onclick="switchTab('positions')">📊 持仓</button>
            <button class="nav-tab" onclick="switchTab('trades')">📜 交易</button>
            <button class="nav-tab" onclick="switchTab('market')">🔥 市场</button>
            <button class="nav-tab" onclick="switchTab('review')">📝 复盘</button>
            <button class="nav-tab" onclick="switchTab('ai')">🤖 AI交易</button>
        </div>

        <!-- Positions Panel -->
        <div class="tab-panel active" id="panel-positions">
            <div class="search-bar">
                <input type="text" class="search-input" id="search-stock" placeholder="输入股票代码，如 002475">
                <button class="btn-add" onclick="showBuyModal()">+ 买入</button>
            </div>
            <div class="card" style="padding:0;overflow:hidden;">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>股票</th>
                            <th>持仓/成本</th>
                            <th>现价</th>
                            <th>盈亏额</th>
                            <th>盈亏%</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="positions-body">
                        <tr><td colspan="6" style="text-align:center;padding:2rem;color:var(--text-muted)">暂无持仓 · 点击上方买入按钮建仓</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Trades Panel -->
        <div class="tab-panel" id="panel-trades">
            <div class="card" style="padding:0;overflow:hidden;" id="trades-list">
                <div style="text-align:center;padding:2rem;color:var(--text-muted)">暂无交易记录</div>
            </div>
        </div>

        <!-- Market Panel -->
        <div class="tab-panel" id="panel-market">
            <div class="card" id="market-list">
                <div style="text-align:center;padding:2rem;color:var(--text-muted)">加载中...</div>
            </div>
        </div>

        <!-- Review Panel -->
        <div class="tab-panel" id="panel-review">
            <div style="margin-bottom:1rem">
                <button class="btn-ai" onclick="showReviewModal()">✍️ 写复盘</button>
            </div>
            <div id="review-list">
                <div style="text-align:center;padding:2rem;color:var(--text-muted)">暂无复盘记录</div>
            </div>
        </div>

        <!-- AI Panel -->
        <div class="tab-panel" id="panel-ai">
            <div class="stats-row">
                <div class="mini-stat">
                    <div class="mini-stat-value text-blue" id="stat-total">0</div>
                    <div class="mini-stat-label">总交易</div>
                </div>
                <div class="mini-stat">
                    <div class="mini-stat-value text-green" id="stat-win">0</div>
                    <div class="mini-stat-label">盈利次数</div>
                </div>
                <div class="mini-stat">
                    <div class="mini-stat-value" id="stat-rate">0%</div>
                    <div class="mini-stat-label">胜率</div>
                </div>
                <div class="mini-stat">
                    <div class="mini-stat-value" id="stat-net">0</div>
                    <div class="mini-stat-label">净收益</div>
                </div>
            </div>
            
            <div class="card chart-box">
                <h4 style="font-size:0.875rem;font-weight:600;margin-bottom:1rem;color:var(--text-secondary)">📈 账户净值曲线</h4>
                <div id="equity-chart" style="height:260px"></div>
            </div>
            
            <div class="ai-decision-box">
                <h4 style="font-size:0.875rem;font-weight:600;margin-bottom:0.75rem">🤖 蛋蛋的交易决策</h4>
                <div class="ai-decision-text" id="ai-decision">点击下方按钮，让蛋蛋分析市场并做出交易决策 👇</div>
                <div style="margin-top:1rem;display:flex;gap:0.75rem">
                    <button class="btn-ai" onclick="aiAnalyze()">🧠 AI分析</button>
                    <button class="btn-ai" onclick="aiAutoTrade()">⚡ AI自动交易</button>
                </div>
            </div>
        </div>
    </main>

    <footer class="app-footer">
        🥚 蛋蛋爱挣钱系统 v2.0 · 数据来源：腾讯财经 · 仅供模拟勿当真
    </footer>

    <!-- Buy Modal -->
    <div class="modal-overlay" id="buy-modal">
        <div class="modal-box">
            <h3>🟢 买入股票</h3>
            <input type="text" class="form-input" id="buy-code" placeholder="股票代码，如 002475">
            <input type="number" class="form-input" id="buy-shares" placeholder="买入数量（手），1手=100股" value="1" min="1">
            <input type="text" class="form-input" id="buy-reason" placeholder="买入理由（可选）">
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeModal('buy-modal')">取消</button>
                <button class="btn-confirm" onclick="executeBuy()">确认买入</button>
            </div>
        </div>
    </div>

    <!-- Sell Modal -->
    <div class="modal-overlay" id="sell-modal">
        <div class="modal-box">
            <h3>🔴 卖出股票</h3>
            <input type="text" class="form-input" id="sell-code" placeholder="股票代码" readonly>
            <input type="text" class="form-input" id="sell-name" placeholder="股票名称" readonly>
            <input type="number" class="form-input" id="sell-shares" placeholder="卖出数量（手）" min="1">
            <input type="text" class="form-input" id="sell-reason" placeholder="卖出理由（可选）">
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeModal('sell-modal')">取消</button>
                <button class="btn-confirm" style="background:var(--gradient-red)" onclick="executeSell()">确认卖出</button>
            </div>
        </div>
    </div>

    <!-- Review Modal -->
    <div class="modal-overlay" id="review-modal">
        <div class="modal-box">
            <h3>✍️ 写复盘</h3>
            <textarea class="form-input" id="review-content" placeholder="今日复盘内容..." style="height:100px;resize:vertical;font-family:inherit"></textarea>
            <input type="text" class="form-input" id="review-tags" placeholder="标签，用逗号分隔，如：止损,仓位管理">
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeModal('review-modal')">取消</button>
                <button class="btn-confirm" onclick="executeReview()">保存</button>
            </div>
        </div>
    </div>

    <script>
        let equityChart = null;
        
        // Clock
        function updateClock() {
            document.getElementById('clock').textContent = new Date().toLocaleString('zh-CN', {hour12: false, year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit', second:'2-digit'}).replace(/\//g, '-');
        }
        setInterval(updateClock, 1000);
        updateClock();

        // Tab Switch
        function switchTab(tab) {
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('panel-' + tab).classList.add('active');
            if (tab === 'ai') { loadStats(); loadEquityChart(); }
        }

        // Load Portfolio
        async function loadPortfolio() {
            try {
                const res = await fetch('/api/portfolio');
                const data = await res.json();
                
                document.getElementById('total-value').textContent = formatMoney(data.total_value);
                const profit = data.total_profit || 0;
                const profitEl = document.getElementById('total-profit');
                profitEl.textContent = (profit >= 0 ? '+' : '') + formatMoney(profit);
                profitEl.className = 'stat-value ' + (profit >= 0 ? 'text-green' : 'text-red');
                
                const rate = (profit / 50000 * 100).toFixed(2);
                document.getElementById('profit-rate').textContent = (profit >= 0 ? '+' : '') + rate + '%';
                document.getElementById('cash').textContent = formatMoney(data.cash);
                
                const positions = data.positions || {};
                const posCount = Object.keys(positions).length;
                document.getElementById('position-count').textContent = posCount + '只股票';
                
                let posValue = 0;
                const posEntries = Object.entries(positions);
                for (const [code, pos] of posEntries) {
                    try {
                        const q = await fetch(`/api/quote/${code}`);
                        const qd = await q.json();
                        posValue += qd.price * pos.shares;
                    } catch(e) { posValue += pos.avg_cost * pos.shares; }
                }
                document.getElementById('position-value').textContent = formatMoney(posValue);
                await updatePositionsTable(positions);
            } catch(e) { console.error(e); }
        }

        async function updatePositionsTable(positions) {
            const tbody = document.getElementById('positions-body');
            const entries = Object.entries(positions);
            
            if (entries.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:2rem;color:var(--text-muted)">暂无持仓 · 点击上方买入按钮建仓</td></tr>';
                return;
            }
            
            let html = '';
            for (const [code, pos] of entries) {
                try {
                    const q = await fetch(`/api/quote/${code}`);
                    const qd = await q.json();
                    const profit = (qd.price - pos.avg_cost) * pos.shares;
                    const profitRate = ((qd.price / pos.avg_cost - 1) * 100).toFixed(2);
                    const upDown = qd.change >= 0 ? 'up' : 'down';
                    
                    html += `<tr>
                        <td>
                            <div class="stock-name">${qd.name}</div>
                            <div class="stock-code">${code}</div>
                        </td>
                        <td>
                            <div>${pos.shares}股</div>
                            <div class="stock-code">成本 ${pos.avg_cost.toFixed(2)}</div>
                        </td>
                        <td>
                            <div class="${upDown}">${qd.price.toFixed(2)}</div>
                            <div class="stock-code ${upDown}">${qd.change >= 0 ? '+' : ''}${qd.change.toFixed(2)}%</div>
                        </td>
                        <td class="${profit >= 0 ? 'up' : 'down'}">${profit >= 0 ? '+' : ''}${profit.toFixed(2)}</td>
                        <td class="${profit >= 0 ? 'up' : 'down'}">${profit >= 0 ? '+' : ''}${profitRate}%</td>
                        <td><button class="btn-sell" onclick="showSellModal('${code}','${qd.name}',${pos.shares})">卖出</button></td>
                    </tr>`;
                } catch(e) {
                    html += `<tr><td colspan="6" style="color:var(--text-muted)">${pos.stock_name || code} - 加载失败</td></tr>`;
                }
            }
            tbody.innerHTML = html;
        }

        // Load Trades
        async function loadTrades() {
            try {
                const res = await fetch('/api/trades');
                const trades = await res.json();
                const list = document.getElementById('trades-list');
                
                if (!trades || trades.length === 0) {
                    list.innerHTML = '<div style="text-align:center;padding:2rem;color:var(--text-muted)">暂无交易记录</div>';
                    return;
                }
                
                let html = `<table class="data-table"><thead><tr><th>时间</th><th>操作</th><th>股票</th><th>数量</th><th>价格</th><th>金额</th><th>收益</th><th>备注</th></tr></thead><tbody>`;
                trades.slice().reverse().forEach(t => {
                    const ts = new Date(t.timestamp).toLocaleString('zh-CN', {hour12:false}).replace(/\//g, '-');
                    const profitStr = t.profit != 0 ? `<span class="${t.profit >= 0 ? 'up' : 'down'}">${t.profit >= 0 ? '+' : ''}${Number(t.profit).toFixed(2)}</span>` : '-';
                    html += `<tr>
                        <td style="color:var(--text-muted);font-size:0.8rem">${ts}</td>
                        <td><span class="btn-${t.action}" style="cursor:default">${t.action === 'buy' ? '买入' : '卖出'}</span></td>
                        <td><div class="stock-name">${t.stock_name}</div><div class="stock-code">${t.stock_code}</div></td>
                        <td>${t.shares}股</td>
                        <td>${Number(t.price).toFixed(2)}</td>
                        <td>${formatMoney(Number(t.amount))}</td>
                        <td>${profitStr}</td>
                        <td style="color:var(--text-muted);font-size:0.8rem">${t.reason || '-'}</td>
                    </tr>`;
                });
                html += '</tbody></table>';
                list.innerHTML = html;
                
                const today = new Date().toDateString();
                document.getElementById('today-trades').textContent = trades.filter(t => new Date(t.timestamp).toDateString() === today).length;
            } catch(e) { console.error(e); }
        }

        // Load Market
        async function loadMarket() {
            try {
                const res = await fetch('/api/market/top');
                const data = await res.json();
                const list = document.getElementById('market-list');
                
                if (!data || !data.length) {
                    list.innerHTML = '<div style="text-align:center;padding:2rem;color:var(--text-muted)">加载失败</div>';
                    return;
                }
                
                let html = '';
                data.forEach(s => {
                    const cls = s.change_pct >= 0 ? 'up' : 'down';
                    html += `<div class="market-item">
                        <div>
                            <div class="market-name">${s.name}</div>
                            <div class="market-code">${s.code}</div>
                        </div>
                        <div style="text-align:right">
                            <div class="market-price">${s.price.toFixed(2)}</div>
                            <div class="market-change ${cls}">${s.change_pct >= 0 ? '+' : ''}${s.change_pct.toFixed(2)}%</div>
                        </div>
                    </div>`;
                });
                list.innerHTML = html;
            } catch(e) { console.error(e); }
        }

        // Load Reviews
        async function loadReviews() {
            try {
                const res = await fetch('/api/daily');
                const reviews = await res.json();
                const list = document.getElementById('review-list');
                
                if (!reviews || reviews.length === 0) {
                    list.innerHTML = '<div style="text-align:center;padding:2rem;color:var(--text-muted)">暂无复盘记录</div>';
                    return;
                }
                
                let html = '';
                reviews.slice().reverse().forEach(r => {
                    const ts = new Date(r.timestamp).toLocaleString('zh-CN', {hour12:false}).replace(/\//g, '-');
                    const tags = r.tags || [];
                    const tagHtml = tags.map(t => `<span class="review-tag">${t}</span>`).join('');
                    const profitStr = r.profit != 0 ? `<span class="${r.profit >= 0 ? 'up' : 'down'}" style="float:right">${r.profit >= 0 ? '+' : ''}${Number(r.profit).toFixed(2)}</span>` : '';
                    html += `<div class="review-item">
                        <div class="review-date">${ts} ${profitStr}</div>
                        <div class="review-content">${r.content}</div>
                        ${tagHtml ? `<div>${tagHtml}</div>` : ''}
                    </div>`;
                });
                list.innerHTML = html;
            } catch(e) { console.error(e); }
        }

        // Load Stats
        async function loadStats() {
            try {
                const res = await fetch('/api/stats');
                const stats = await res.json();
                document.getElementById('stat-total').textContent = stats.total_trades || 0;
                document.getElementById('stat-win').textContent = stats.win_trades || 0;
                const rateEl = document.getElementById('stat-rate');
                rateEl.textContent = (stats.win_rate || 0) + '%';
                const netEl = document.getElementById('stat-net');
                netEl.textContent = (stats.net_profit >= 0 ? '+' : '') + formatMoney(stats.net_profit || 0);
                netEl.className = 'mini-stat-value ' + (stats.net_profit >= 0 ? 'text-green' : 'text-red');
            } catch(e) { console.error(e); }
        }

        // Equity Chart
        async function loadEquityChart() {
            try {
                const res = await fetch('/api/equity');
                const data = await res.json();
                
                if (!equityChart) equityChart = echarts.init(document.getElementById('equity-chart'));
                
                const dates = data.map(d => d.date).reverse();
                const values = data.map(d => d.total_value).reverse();
                
                equityChart.setOption({
                    tooltip: { trigger: 'axis', backgroundColor: '#1a2235', borderColor: '#334155', textStyle: { color: '#f1f5f9' } },
                    grid: { left: 60, right: 20, top: 10, bottom: 30 },
                    xAxis: { type: 'category', data: dates, axisLabel: { color: '#64748b', fontSize: 11 }, axisLine: { lineStyle: { color: '#1e293b' } } },
                    yAxis: { type: 'value', axisLabel: { color: '#64748b', fontSize: 11, formatter: v => (v/10000).toFixed(0) + '万' }, splitLine: { lineStyle: { color: '#1e293b' } } },
                    series: [{
                        data: values,
                        type: 'line',
                        smooth: true,
                        lineStyle: { color: '#3b82f6', width: 2 },
                        areaStyle: { color: { type: 'linear', x: 0, y: 0, x2: 0, y2: 1, colorStops: [{ offset: 0, color: 'rgba(59,130,246,0.3)' }, { offset: 1, color: 'rgba(59,130,246,0.02)' }] } },
                        symbol: 'none'
                    }],
                    animation: true
                });
            } catch(e) { console.error(e); }
        }

        // Refresh All
        async function refreshAll() {
            const icon = document.getElementById('refresh-icon');
            icon.classList.add('spinning');
            await Promise.all([loadPortfolio(), loadTrades(), loadReviews()]);
            setTimeout(() => icon.classList.remove('spinning'), 500);
        }

        // Format
        function formatMoney(n) {
            return '¥' + Math.abs(n).toLocaleString('zh-CN', {minimumFractionDigits: 2, maximumFractionDigits: 2});
        }

        // Buy Modal
        function showBuyModal() {
            const code = document.getElementById('search-stock').value.trim();
            if (code) document.getElementById('buy-code').value = code;
            document.getElementById('buy-modal').classList.add('show');
        }

        async function executeBuy() {
            const code = document.getElementById('buy-code').value.trim();
            const shares = parseInt(document.getElementById('buy-shares').value) || 1;
            const reason = document.getElementById('buy-reason').value.trim();
            if (!code) { alert('请输入股票代码'); return; }
            try {
                const res = await fetch('/api/trade', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'buy', stock_code: code, shares: shares * 100, reason })
                });
                const data = await res.json();
                if (data.error) { alert(data.error); return; }
                closeModal('buy-modal');
                alert(`✅ 买入成功！\n${data.trade.stock_name} ${data.trade.shares}股 @ ${data.trade.price.toFixed(2)}`);
                refreshAll();
            } catch(e) { alert('买入失败: ' + e); }
        }

        // Sell Modal
        function showSellModal(code, name, shares) {
            document.getElementById('sell-code').value = code;
            document.getElementById('sell-name').value = name;
            document.getElementById('sell-shares').value = 1;
            document.getElementById('sell-shares').max = shares;
            document.getElementById('sell-modal').classList.add('show');
        }

        async function executeSell() {
            const code = document.getElementById('sell-code').value;
            const shares = parseInt(document.getElementById('sell-shares').value) || 1;
            const reason = document.getElementById('sell-reason').value.trim();
            try {
                const res = await fetch('/api/trade', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'sell', stock_code: code, shares: shares * 100, reason })
                });
                const data = await res.json();
                if (data.error) { alert(data.error); return; }
                closeModal('sell-modal');
                alert(`✅ 卖出成功！\n${data.trade.stock_name} ${data.trade.shares}股 @ ${data.trade.price.toFixed(2)}\n收益: ${(data.trade.profit || 0).toFixed(2)}`);
                refreshAll();
            } catch(e) { alert('卖出失败: ' + e); }
        }

        // Review Modal
        function showReviewModal() {
            document.getElementById('review-modal').classList.add('show');
        }

        async function executeReview() {
            const content = document.getElementById('review-content').value.trim();
            const tagsStr = document.getElementById('review-tags').value.trim();
            const tags = tagsStr ? tagsStr.split(',').map(t => t.trim()).filter(t => t) : [];
            if (!content) { alert('请输入复盘内容'); return; }
            try {
                await fetch('/api/review', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content, tags })
                });
                closeModal('review-modal');
                document.getElementById('review-content').value = '';
                document.getElementById('review-tags').value = '';
                alert('复盘已保存！');
                loadReviews();
            } catch(e) { alert('保存失败: ' + e); }
        }

        // AI Analyze
        async function aiAnalyze() {
            const el = document.getElementById('ai-decision');
            el.innerHTML = '🧠 蛋蛋正在分析市场...';
            try {
                const [portfolio, stats] = await Promise.all([
                    fetch('/api/portfolio').then(r => r.json()),
                    fetch('/api/stats').then(r => r.json())
                ]);
                const positions = Object.entries(portfolio.positions || {});
                let html = `<strong>📊 当前状态</strong><br>`;
                html += `总资产: ${formatMoney(portfolio.total_value)}<br>`;
                html += `可用资金: ${formatMoney(portfolio.cash)}<br>`;
                html += `持仓: ${positions.length}只 | 胜率: ${stats.win_rate || 0}%<br><br>`;
                if (positions.length > 0) {
                    html += `<strong>📋 持仓分析:</strong><br>`;
                    for (const [code, pos] of positions) {
                        try {
                            const q = await fetch(`/api/quote/${code}`).then(r => r.json());
                            const rate = ((q.price / pos.avg_cost - 1) * 100).toFixed(2);
                            html += `- ${q.name}(${code}): 现价${q.price}元, 成本${pos.avg_cost}元, ${rate}%<br>`;
                        } catch(e) {}
                    }
                }
                html += `<br><strong>💡 蛋蛋建议:</strong><br>`;
                if (portfolio.cash > 40000) html += `- 资金充裕，可考虑建仓<br>`;
                if (positions.length < 2) html += `- 建议分散到2-3只<br>`;
                html += `- 严格执行止损纪律<br>`;
                el.innerHTML = html;
            } catch(e) { el.innerHTML = '分析失败: ' + e; }
        }

        // AI Auto Trade
        async function aiAutoTrade() {
            const el = document.getElementById('ai-decision');
            el.innerHTML = '⚡ 蛋蛋正在执行自动交易...';
            try {
                const [portfolio, marketRes] = await Promise.all([
                    fetch('/api/portfolio').then(r => r.json()),
                    fetch('/api/market/top').then(r => r.json())
                ]);
                let html = '';
                if (portfolio.cash > 40000 && Object.keys(portfolio.positions || {}).length < 2) {
                    const candidates = (marketRes || []).filter(s => s.change_pct < 5 && s.change_pct > -5);
                    if (candidates.length > 0) {
                        const stock = candidates[Math.floor(Math.random() * Math.min(3, candidates.length))];
                        const buyShares = Math.floor(portfolio.cash * 0.4 / stock.price / 100) * 100;
                        if (buyShares >= 100) {
                            const res = await fetch('/api/trade', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ action: 'buy', stock_code: stock.code, shares: buyShares, reason: 'AI自动建仓 - 分散投资' })
                            });
                            const data = await res.json();
                            if (data.success) {
                                html = `✅ AI买入成功!<br>${stock.name}(${stock.code}) ${buyShares}股 @ ${stock.price.toFixed(2)}<br>花费: ${formatMoney(buyShares * stock.price)}`;
                            }
                        }
                    }
                } else {
                    html = `📊 当前仓位已满或资金不足<br>持仓: ${Object.keys(portfolio.positions || {}).length}只<br>可用: ${formatMoney(portfolio.cash)}`;
                }
                el.innerHTML = html;
                refreshAll();
            } catch(e) { el.innerHTML = '自动交易失败: ' + e; }
        }

        // Modal Close
        function closeModal(id) { document.getElementById(id).classList.remove('show'); }
        
        // Click outside modal to close
        document.querySelectorAll('.modal-overlay').forEach(m => {
            m.addEventListener('click', e => { if (e.target === m) m.classList.remove('show'); });
        });

        // Init
        loadPortfolio();
        loadTrades();
        loadMarket();
        loadReviews();
        setInterval(refreshAll, 30000);
        window.addEventListener('resize', () => { if (equityChart) equityChart.resize(); });
    </script>
</body>
</html>
