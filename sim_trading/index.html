<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🥚 蛋蛋模拟炒股系统</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #1a1a2e; color: #eee; min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        .header h1 { font-size: 24px; }
        .header .time { color: #ccc; font-size: 14px; }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        
        /* 概览卡片 */
        .overview {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        .card {
            background: #16213e;
            border-radius: 12px;
            padding: 18px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .card-title { color: #888; font-size: 12px; margin-bottom: 6px; }
        .card-value { font-size: 26px; font-weight: bold; }
        .card-value.red { color: #ff4d4f; }
        .card-value.green { color: #52c41a; }
        .card-value.blue { color: #1890ff; }
        .card-sub { font-size: 11px; color: #666; margin-top: 4px; }
        
        /* 标签页 */
        .tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 20px;
            background: #16213e;
            padding: 5px;
            border-radius: 10px;
            flex-wrap: wrap;
        }
        .tab {
            padding: 10px 18px;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s;
            font-size: 14px;
        }
        .tab:hover { background: #1f3460; }
        .tab.active { background: #667eea; }
        
        .panel { display: none; }
        .panel.active { display: block; }
        
        /* 表格 */
        .positions-table {
            width: 100%;
            border-collapse: collapse;
            background: #16213e;
            border-radius: 12px;
            overflow: hidden;
        }
        .positions-table th, .positions-table td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #2a3a5a;
        }
        .positions-table th { background: #1f3460; color: #aaa; font-weight: 500; font-size: 13px; }
        .positions-table tr:hover { background: #1f3460; }
        .up { color: #ff4d4f; }
        .down { color: #52c41a; }
        
        /* 交易记录 */
        .trade-list { background: #16213e; border-radius: 12px; overflow: hidden; }
        .trade-item {
            padding: 15px 20px;
            border-bottom: 1px solid #2a3a5a;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .trade-item:last-child { border-bottom: none; }
        .trade-type { 
            padding: 3px 10px; 
            border-radius: 4px; 
            font-size: 12px; 
            font-weight: bold;
        }
        .trade-type.buy { background: #ff4d4f33; color: #ff4d4f; }
        .trade-type.sell { background: #52c41a33; color: #52c41a; }
        
        /* K线图容器 */
        .chart-container { background: #16213e; border-radius: 12px; padding: 15px; margin-bottom: 20px; }
        .chart { height: 350px; }
        
        /* 搜索 */
        .search-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .search-bar input {
            flex: 1;
            padding: 12px 15px;
            border-radius: 8px;
            border: 1px solid #2a3a5a;
            background: #16213e;
            color: #fff;
            font-size: 14px;
        }
        .search-bar input:focus { outline: none; border-color: #667eea; }
        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.3s;
        }
        .btn-primary { background: #667eea; color: #fff; }
        .btn-primary:hover { background: #5a6fd4; }
        .btn-success { background: #52c41a; color: #fff; }
        .btn-danger { background: #ff4d4f; color: #fff; }
        .btn-warning { background: #faad14; color: #fff; }
        
        /* 弹窗 */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal.show { display: flex; }
        .modal-content {
            background: #1a1a2e;
            border-radius: 12px;
            padding: 25px;
            min-width: 350px;
            max-width: 500px;
        }
        .modal h3 { margin-bottom: 20px; }
        .modal input, .modal select, .modal textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 6px;
            border: 1px solid #2a3a5a;
            background: #16213e;
            color: #fff;
        }
        .modal textarea { height: 100px; resize: vertical; }
        .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 15px; }
        
        /* 市场列表 */
        .market-list { background: #16213e; border-radius: 12px; overflow: hidden; }
        .market-item {
            padding: 12px 15px;
            border-bottom: 1px solid #2a3a5a;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .market-item:last-child { border-bottom: none; }
        .stock-code { color: #888; font-size: 12px; }
        
        /* 复盘 */
        .review-item {
            background: #16213e;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
        }
        .review-date { color: #667eea; font-size: 13px; margin-bottom: 8px; }
        .review-content { line-height: 1.8; color: #ccc; }
        .review-tags { margin-top: 10px; }
        .review-tag {
            display: inline-block;
            padding: 3px 10px;
            background: #667eea33;
            color: #667eea;
            border-radius: 4px;
            font-size: 12px;
            margin-right: 5px;
        }
        
        /* 统计面板 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: #16213e;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }
        .stat-value { font-size: 28px; font-weight: bold; }
        .stat-label { color: #888; font-size: 13px; margin-top: 5px; }
        
        /* 分析结果 */
        .analysis-result {
            background: #16213e;
            border-radius: 12px;
            padding: 20px;
            margin-top: 15px;
        }
        .signal-badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
        }
        .signal-buy { background: #ff4d4f33; color: #ff4d4f; }
        .signal-sell { background: #52c41a33; color: #52c41a; }
        .signal-hold { background: #faad1433; color: #faad14; }
        
        /* 刷新动画 */
        .refreshing { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        /* 响应式 */
        @media (max-width: 768px) {
            .header h1 { font-size: 18px; }
            .card-value { font-size: 20px; }
            .overview { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🥚 蛋蛋模拟炒股系统</h1>
        <div>
            <span class="time" id="clock">--:--:--</span>
            <button class="btn btn-primary" onclick="refreshAll()" style="margin-left:15px">🔄 刷新</button>
        </div>
    </div>
    
    <div class="container">
        <!-- 概览 -->
        <div class="overview" id="overview">
            <div class="card">
                <div class="card-title">总资产</div>
                <div class="card-value blue" id="total-value">--</div>
                <div class="card-sub">初始: 100万</div>
            </div>
            <div class="card">
                <div class="card-title">总收益</div>
                <div class="card-value" id="total-profit">--</div>
                <div class="card-sub" id="profit-rate">--</div>
            </div>
            <div class="card">
                <div class="card-title">持仓市值</div>
                <div class="card-value blue" id="position-value">--</div>
                <div class="card-sub" id="position-count">0只股票</div>
            </div>
            <div class="card">
                <div class="card-title">可用资金</div>
                <div class="card-value blue" id="cash">--</div>
                <div class="card-sub">今日操作: <span id="today-trades">0</span>次</div>
            </div>
        </div>
        
        <!-- 标签页 -->
        <div class="tabs">
            <div class="tab active" onclick="switchTab('positions')">📊 持仓</div>
            <div class="tab" onclick="switchTab('trades')">📜 交易记录</div>
            <div class="tab" onclick="switchTab('market')">🔥 市场</div>
            <div class="tab" onclick="switchTab('review')">📝 复盘</div>
            <div class="tab" onclick="switchTab('ai')">🤖 AI交易</div>
        </div>
        
        <!-- 持仓面板 -->
        <div class="panel active" id="panel-positions">
            <div class="search-bar">
                <input type="text" id="search-stock" placeholder="输入股票代码">
                <button class="btn btn-success" onclick="showBuyModal()">🟢 买入</button>
            </div>
            <table class="positions-table">
                <thead>
                    <tr>
                        <th>股票名称</th>
                        <th>代码</th>
                        <th>持仓/成本</th>
                        <th>现价</th>
                        <th>盈亏额</th>
                        <th>盈亏%</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="positions-body">
                    <tr><td colspan="7" style="text-align:center;padding:30px;color:#666">暂无持仓</td></tr>
                </tbody>
            </table>
        </div>
        
        <!-- 交易记录 -->
        <div class="panel" id="panel-trades">
            <div class="trade-list" id="trades-list">
                <div style="text-align:center;padding:30px;color:#666">暂无交易记录</div>
            </div>
        </div>
        
        <!-- 市场 -->
        <div class="panel" id="panel-market">
            <h3 style="margin-bottom:15px">📈 热门股票</h3>
            <div class="market-list" id="market-list">
                <div style="text-align:center;padding:30px;color:#666">加载中...</div>
            </div>
        </div>
        
        <!-- 复盘 -->
        <div class="panel" id="panel-review">
            <div style="margin-bottom:20px">
                <button class="btn btn-primary" onclick="showReviewModal()">✍️ 写复盘</button>
            </div>
            <div id="review-list">
                <div style="text-align:center;padding:30px;color:#666">暂无复盘记录</div>
            </div>
        </div>
        
        <!-- AI交易 -->
        <div class="panel" id="panel-ai">
            <div class="stats-grid" id="stats-grid">
                <div class="stat-card">
                    <div class="stat-value blue" id="stat-total">0</div>
                    <div class="stat-label">总交易次数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="stat-win">0</div>
                    <div class="stat-label">盈利次数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="stat-rate">0%</div>
                    <div class="stat-label">胜率</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value green" id="stat-net">0</div>
                    <div class="stat-label">净收益</div>
                </div>
            </div>
            
            <div class="chart-container">
                <h3 style="margin-bottom:15px">📈 账户净值曲线</h3>
                <div id="equity-chart" class="chart"></div>
            </div>
            
            <div class="card" style="margin-bottom:20px">
                <h3 style="margin-bottom:15px">🤖 蛋蛋的交易决策</h3>
                <div id="ai-decision" style="color:#ccc;line-height:1.8">
                    点击下方按钮，让蛋蛋分析市场并做出交易决策
                </div>
                <div style="margin-top:15px">
                    <button class="btn btn-success" onclick="aiAnalyze()">🧠 AI分析决策</button>
                    <button class="btn btn-primary" onclick="aiAutoTrade()">⚡ AI自动交易</button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 买入弹窗 -->
    <div class="modal" id="buy-modal">
        <div class="modal-content">
            <h3>🟢 买入股票</h3>
            <input type="text" id="buy-code" placeholder="股票代码，如 300750">
            <input type="number" id="buy-shares" placeholder="买入数量(手)，1手=100股" value="1">
            <input type="text" id="buy-reason" placeholder="买入理由(可选)">
            <div class="modal-actions">
                <button class="btn" onclick="closeModal('buy-modal')">取消</button>
                <button class="btn btn-success" onclick="executeBuy()">确认买入</button>
            </div>
        </div>
    </div>
    
    <!-- 卖出弹窗 -->
    <div class="modal" id="sell-modal">
        <div class="modal-content">
            <h3>🔴 卖出股票</h3>
            <input type="text" id="sell-code" placeholder="股票代码" readonly>
            <input type="text" id="sell-name" placeholder="股票名称" readonly>
            <input type="number" id="sell-shares" placeholder="卖出数量(手)">
            <input type="text" id="sell-reason" placeholder="卖出理由(可选)">
            <div class="modal-actions">
                <button class="btn" onclick="closeModal('sell-modal')">取消</button>
                <button class="btn btn-danger" onclick="executeSell()">确认卖出</button>
            </div>
        </div>
    </div>
    
    <!-- 复盘弹窗 -->
    <div class="modal" id="review-modal">
        <div class="modal-content">
            <h3>✍️ 写复盘</h3>
            <textarea id="review-content" placeholder="今日复盘内容..."></textarea>
            <input type="text" id="review-tags" placeholder="标签，用逗号分隔，如：止损,龙头股">
            <div class="modal-actions">
                <button class="btn" onclick="closeModal('review-modal')">取消</button>
                <button class="btn btn-primary" onclick="executeReview()">保存</button>
            </div>
        </div>
    </div>

    <script>
        let equityChart = null;
        
        // 时钟
        function updateClock() {
            document.getElementById('clock').textContent = new Date().toLocaleString('zh-CN', {hour12: false});
        }
        setInterval(updateClock, 1000);
        updateClock();
        
        // 标签页
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(`panel-${tab}`).classList.add('active');
            if (tab === 'ai') {
                loadStats();
                loadEquityChart();
            }
        }
        
        // 加载账户
        async function loadPortfolio() {
            try {
                const res = await fetch('/api/portfolio');
                const data = await res.json();
                
                document.getElementById('total-value').textContent = formatMoney(data.total_value);
                const profit = data.total_profit || 0;
                const profitEl = document.getElementById('total-profit');
                profitEl.textContent = (profit >= 0 ? '+' : '') + formatMoney(profit);
                profitEl.className = 'card-value ' + (profit >= 0 ? 'red' : 'green');
                
                const rate = (profit / 1000000 * 100).toFixed(2);
                document.getElementById('profit-rate').textContent = (profit >= 0 ? '+' : '') + rate + '%';
                document.getElementById('cash').textContent = formatMoney(data.cash);
                
                const positions = data.positions || {};
                const posCount = Object.keys(positions).length;
                document.getElementById('position-count').textContent = posCount + '只股票';
                
                let posValue = 0;
                for (const [code, pos] of Object.entries(positions)) {
                    try {
                        const q = await fetch(`/api/quote/${code}`);
                        const qd = await q.json();
                        posValue += qd.price * pos.shares;
                    } catch(e) {
                        posValue += pos.avg_cost * pos.shares;
                    }
                }
                document.getElementById('position-value').textContent = formatMoney(posValue);
                
                await updatePositionsTable(positions);
            } catch(e) {
                console.error('加载失败:', e);
            }
        }
        
        async function updatePositionsTable(positions) {
            const tbody = document.getElementById('positions-body');
            const entries = Object.entries(positions);
            
            if (entries.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:30px;color:#666">暂无持仓</td></tr>';
                return;
            }
            
            let html = '';
            for (const [code, pos] of entries) {
                try {
                    const q = await fetch(`/api/quote/${code}`);
                    const qd = await q.json();
                    const profit = (q.price - pos.avg_cost) * pos.shares;
                    const profitRate = ((q.price / pos.avg_cost - 1) * 100).toFixed(2);
                    const upDown = q.change >= 0 ? 'up' : 'down';
                    
                    html += `<tr>
                        <td>${q.name}</td>
                        <td>${code}</td>
                        <td>${pos.shares}股<br><span style="color:#888;font-size:12px">成本:${pos.avg_cost.toFixed(2)}</span></td>
                        <td class="${upDown}">${q.price.toFixed(2)}<br><span style="font-size:12px">${q.change >= 0 ? '+' : ''}${q.change.toFixed(2)}%</span></td>
                        <td class="${profit >= 0 ? 'up' : 'down'}">${profit >= 0 ? '+' : ''}${profit.toFixed(2)}</td>
                        <td class="${profit >= 0 ? 'up' : 'down'}">${profit >= 0 ? '+' : ''}${profitRate}%</td>
                        <td><button class="btn btn-danger" style="padding:5px 10px;font-size:12px" onclick="showSellModal('${code}', '${q.name}', ${pos.shares})">卖出</button></td>
                    </tr>`;
                } catch(e) {
                    html += `<tr><td>${pos.stock_name || code}</td><td>${code}</td><td>${pos.shares}股</td><td colspan="4">加载失败</td></tr>`;
                }
            }
            tbody.innerHTML = html;
        }
        
        // 加载交易记录
        async function loadTrades() {
            try {
                const res = await fetch('/api/trades');
                const trades = await res.json();
                const list = document.getElementById('trades-list');
                
                if (!trades || trades.length === 0) {
                    list.innerHTML = '<div style="text-align:center;padding:30px;color:#666">暂无交易记录</div>';
                    return;
                }
                
                let html = '';
                trades.forEach(t => {
                    const ts = new Date(t.timestamp).toLocaleString('zh-CN', {hour12: false});
                    const profitStr = t.profit != 0 ? `<span class="${t.profit >= 0 ? 'up' : 'down'}">${t.profit >= 0 ? '+' : ''}${Number(t.profit).toFixed(2)}</span>` : '';
                    html += `<div class="trade-item">
                        <div>
                            <span class="trade-type ${t.action}">${t.action === 'buy' ? '买入' : '卖出'}</span>
                            <strong>${t.stock_name}</strong> ${t.stock_code}
                            <span style="margin-left:10px">${t.shares}股 × ${Number(t.price).toFixed(2)}</span>
                            ${profitStr}
                        </div>
                        <div style="color:#666;font-size:12px;text-align:right">
                            ${ts}<br>${t.reason || ''}
                        </div>
                    </div>`;
                });
                list.innerHTML = html;
                
                // 今日交易
                const today = new Date().toDateString();
                const todayCount = trades.filter(t => new Date(t.timestamp).toDateString() === today).length;
                document.getElementById('today-trades').textContent = todayCount;
            } catch(e) {
                console.error('加载交易记录失败:', e);
            }
        }
        
        // 加载市场
        async function loadMarket() {
            try {
                const res = await fetch('/api/market/top');
                const data = await res.json();
                const list = document.getElementById('market-list');
                
                if (!data || !data.length) {
                    list.innerHTML = '<div style="text-align:center;padding:30px;color:#666">加载失败</div>';
                    return;
                }
                
                let html = '';
                data.forEach(s => {
                    const cls = s.change_pct >= 0 ? 'up' : 'down';
                    html += `<div class="market-item">
                        <div>
                            <strong>${s.name}</strong>
                            <span class="stock-code">${s.code}</span>
                        </div>
                        <div style="text-align:right">
                            <div class="${cls}">${s.price.toFixed(2)}</div>
                            <div class="${cls}" style="font-size:12px">${s.change_pct >= 0 ? '+' : ''}${s.change_pct.toFixed(2)}%</div>
                        </div>
                    </div>`;
                });
                list.innerHTML = html;
            } catch(e) {
                console.error('加载市场数据失败:', e);
            }
        }
        
        // 加载复盘
        async function loadReviews() {
            try {
                const res = await fetch('/api/daily');
                const reviews = await res.json();
                const list = document.getElementById('review-list');
                
                if (!reviews || reviews.length === 0) {
                    list.innerHTML = '<div style="text-align:center;padding:30px;color:#666">暂无复盘记录</div>';
                    return;
                }
                
                let html = '';
                reviews.forEach(r => {
                    const ts = new Date(r.timestamp).toLocaleString('zh-CN', {hour12: false});
                    const tags = r.tags || [];
                    const tagHtml = tags.map(t => `<span class="review-tag">${t}</span>`).join('');
                    const profitStr = r.profit != 0 ? `<span class="${r.profit >= 0 ? 'up' : 'down'}" style="float:right">${r.profit >= 0 ? '+' : ''}${Number(r.profit).toFixed(2)}</span>` : '';
                    html += `<div class="review-item">
                        <div class="review-date">${ts} ${profitStr}</div>
                        <div class="review-content">${r.content}</div>
                        ${tagHtml ? `<div class="review-tags">${tagHtml}</div>` : ''}
                    </div>`;
                });
                list.innerHTML = html;
            } catch(e) {
                console.error('加载复盘失败:', e);
            }
        }
        
        // 加载统计
        async function loadStats() {
            try {
                const res = await fetch('/api/stats');
                const stats = await res.json();
                
                document.getElementById('stat-total').textContent = stats.total_trades || 0;
                document.getElementById('stat-win').textContent = stats.win_trades || 0;
                document.getElementById('stat-rate').textContent = (stats.win_rate || 0) + '%';
                const netEl = document.getElementById('stat-net');
                netEl.textContent = (stats.net_profit >= 0 ? '+' : '') + formatMoney(stats.net_profit || 0);
                netEl.className = 'stat-value ' + (stats.net_profit >= 0 ? 'green' : 'red');
            } catch(e) {
                console.error('加载统计失败:', e);
            }
        }
        
        // 加载净值曲线
        async function loadEquityChart() {
            try {
                const res = await fetch('/api/equity');
                const data = await res.json();
                
                if (!equityChart) {
                    equityChart = echarts.init(document.getElementById('equity-chart'));
                }
                
                const dates = data.map(d => d.date).reverse();
                const values = data.map(d => d.total_value).reverse();
                
                equityChart.setOption({
                    tooltip: { trigger: 'axis' },
                    xAxis: { type: 'category', data: dates, axisLabel: { color: '#888' } },
                    yAxis: { 
                        type: 'value', 
                        axisLabel: { color: '#888', formatter: v => (v/10000).toFixed(0) + '万' },
                        splitLine: { lineStyle: { color: '#2a3a5a' } }
                    },
                    series: [{
                        data: values,
                        type: 'line',
                        smooth: true,
                        lineStyle: { color: '#667eea', width: 2 },
                        areaStyle: { 
                            color: {
                                type: 'linear',
                                x: 0, y: 0, x2: 0, y2: 1,
                                colorStops: [
                                    { offset: 0, color: 'rgba(102,126,234,0.3)' },
                                    { offset: 1, color: 'rgba(102,126,234,0.05)' }
                                ]
                            }
                        }
                    }],
                    grid: { left: 60, right: 20, top: 20, bottom: 40 }
                });
            } catch(e) {
                console.error('加载净值曲线失败:', e);
            }
        }
        
        // 刷新
        async function refreshAll() {
            const btn = document.querySelector('.header .btn');
            btn.classList.add('refreshing');
            await Promise.all([loadPortfolio(), loadTrades(), loadReviews()]);
            setTimeout(() => btn.classList.remove('refreshing'), 500);
        }
        
        // 格式化
        function formatMoney(n) {
            return '¥' + Math.abs(n).toLocaleString('zh-CN', {minimumFractionDigits: 2, maximumFractionDigits: 2});
        }
        
        // 买入
        function showBuyModal() {
            const code = document.getElementById('search-stock').value.trim();
            if (code) document.getElementById('buy-code').value = code;
            document.getElementById('buy-modal').classList.add('show');
        }
        
        async function executeBuy() {
            const code = document.getElementById('buy-code').value.trim();
            const shares = parseInt(document.getElementById('buy-shares').value) || 1;
            const reason = document.getElementById('buy-reason').value.trim();
            
            if (!code) { alert('请输入股票代码'); return; }
            
            try {
                const res = await fetch('/api/trade', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({action: 'buy', stock_code: code, shares: shares * 100, reason})
                });
                const data = await res.json();
                if (data.error) { alert(data.error); return; }
                closeModal('buy-modal');
                alert(`买入成功！\n${data.trade.stock_name} ${data.trade.shares}股 @ ${data.trade.price.toFixed(2)}`);
                refreshAll();
            } catch(e) {
                alert('买入失败: ' + e);
            }
        }
        
        // 卖出
        function showSellModal(code, name, shares) {
            document.getElementById('sell-code').value = code;
            document.getElementById('sell-name').value = name;
            document.getElementById('sell-shares').value = 1;
            document.getElementById('sell-shares').max = shares;
            document.getElementById('sell-modal').classList.add('show');
        }
        
        async function executeSell() {
            const code = document.getElementById('sell-code').value;
            const shares = parseInt(document.getElementById('sell-shares').value) || 1;
            const reason = document.getElementById('sell-reason').value.trim();
            
            try {
                const res = await fetch('/api/trade', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({action: 'sell', stock_code: code, shares: shares * 100, reason})
                });
                const data = await res.json();
                if (data.error) { alert(data.error); return; }
                closeModal('sell-modal');
                alert(`卖出成功！\n${data.trade.stock_name} ${data.trade.shares}股 @ ${data.trade.price.toFixed(2)}\n收益: ${(data.trade.profit || 0).toFixed(2)}`);
                refreshAll();
            } catch(e) {
                alert('卖出失败: ' + e);
            }
        }
        
        // 复盘
        function showReviewModal() {
            document.getElementById('review-modal').classList.add('show');
        }
        
        async function executeReview() {
            const content = document.getElementById('review-content').value.trim();
            const tagsStr = document.getElementById('review-tags').value.trim();
            const tags = tagsStr ? tagsStr.split(',').map(t => t.trim()).filter(t => t) : [];
            
            if (!content) { alert('请输入复盘内容'); return; }
            
            try {
                const res = await fetch('/api/review', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({content, tags})
                });
                closeModal('review-modal');
                document.getElementById('review-content').value = '';
                document.getElementById('review-tags').value = '';
                alert('复盘已保存！');
                loadReviews();
            } catch(e) {
                alert('保存失败: ' + e);
            }
        }
        
        // AI分析
        async function aiAnalyze() {
            const decision = document.getElementById('ai-decision');
            decision.innerHTML = '🧠 蛋蛋正在分析市场...';
            
            try {
                const [portfolio, trades, stats] = await Promise.all([
                    fetch('/api/portfolio').then(r => r.json()),
                    fetch('/api/trades').then(r => r.json()),
                    fetch('/api/stats').then(r => r.json())
                ]);
                
                const positions = Object.entries(portfolio.positions || {});
                let analysis = `📊 当前状态\n`;
                analysis += `总资产: ${formatMoney(portfolio.total_value)}\n`;
                analysis += `可用资金: ${formatMoney(portfolio.cash)}\n`;
                analysis += `持仓: ${positions.length}只\n`;
                analysis += `胜率: ${stats.win_rate || 0}%\n\n`;
                
                if (positions.length > 0) {
                    analysis += `📋 持仓分析:\n`;
                    for (const [code, pos] of positions) {
                        try {
                            const q = await fetch(`/api/quote/${code}`).then(r => r.json());
                            const profitRate = ((q.price / pos.avg_cost - 1) * 100).toFixed(2);
                            analysis += `- ${q.name}(${code}): 现价${q.price}元, 成本${pos.avg_cost}元, 盈亏${profitRate}%\                        } catch(e) {}
                    }
                }
                
                analysis += `\n💡 建议:\n`;
                if (portfolio.cash > 800000) {
                    analysis += `- 资金充裕，可考虑建仓\n`;
                }
                if (positions.length < 3) {
                    analysis += `- 持仓偏少，建议分散投资\n`;
                }
                analysis += `- 严格执行止损纪律\n`;
                analysis += `- 关注市场热点轮动\n`;
                
                decision.innerHTML = analysis.replace(/\n/g, '<br>');
            } catch(e) {
                decision.innerHTML = '分析失败: ' + e;
            }
        }
        
        // AI自动交易
        async function aiAutoTrade() {
            const decision = document.getElementById('ai-decision');
            decision.innerHTML = '⚡ 蛋蛋正在执行自动交易...';
            
            try {
                const portfolio = await fetch('/api/portfolio').then(r => r.json());
                const marketRes = await fetch('/api/market/top');
                const marketData = await marketRes.json();
                
                let action = '';
                
                // 策略1: 如果持仓少且资金充裕，买入
                if (portfolio.cash > 800000 && Object.keys(portfolio.positions || {}).length < 3) {
                    const candidates = marketData.filter(s => s.change_pct < 5 && s.change_pct > -3);
                    if (candidates.length > 0) {
                        const stock = candidates[Math.floor(Math.random() * Math.min(3, candidates.length))];
                        const buyShares = Math.floor(portfolio.cash * 0.15 / stock.price / 100) * 100;
                        if (buyShares >= 100) {
                            const res = await fetch('/api/trade', {
                                method: 'POST',
                                headers: {'Content-Type': 'application/json'},
                                body: JSON.stringify({
                                    action: 'buy',
                                    stock_code: stock.code,
                                    shares: buyShares,
                                    reason: 'AI自动建仓 - 分散投资'
                                })
                            });
                            const data = await res.json();
                            if (data.success) {
                                action = `✅ AI买入成功!\n`;
                                action += `${stock.name}(${stock.code}) ${buyShares}股 @ ${stock.price.toFixed(2)}\n`;
                                action += `花费: ${(buyShares * stock.price).toFixed(2)}元`;
                            }
                        }
                    }
                } else {
                    action = `📊 当前仓位已满或资金不足\n`;
                    action += `持仓: ${Object.keys(portfolio.positions || {}).length}只\n`;
                    action += `可用: ${formatMoney(portfolio.cash)}`;
                }
                
                decision.innerHTML = action.replace(/\n/g, '<br>');
                refreshAll();
            } catch(e) {
                decision.innerHTML = '自动交易失败: ' + e;
            }
        }
        
        // 弹窗关闭
        function closeModal(id) {
            document.getElementById(id).classList.remove('show');
        }
        
        // 初始化
        loadPortfolio();
        loadTrades();
        loadMarket();
        loadReviews();
        
        setInterval(refreshAll, 30000);
        
        window.addEventListener('resize', () => {
            if (equityChart) equityChart.resize();
        });
    </script>
</body>
</html>
